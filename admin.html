<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Archives - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #ffffff;
            --accent-color: #ffd700;
            --danger-color: #ff4444;
            --success-color: #44ff88;
            --glass-bg: rgba(15, 15, 15, 0.75);
            --glass-border: rgba(255, 255, 255, 0.12);
            --font-header: 'Cinzel', serif;
            --font-body: 'Lora', serif;
            --font-ui: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: var(--font-ui);
            min-height: 100vh;
        }

        /* --- BACKGROUND --- */
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .background-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background: radial-gradient(ellipse at 20% 50%, rgba(25,25,55,0.9) 0%, #050505 70%);
        }

        .admin-container { display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
        .admin-sidebar {
            width: 260px;
            background: rgba(8, 8, 8, 0.88);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-right: 1px solid var(--glass-border);
            padding: 1.5rem;
            display: flex; flex-direction: column;
            position: fixed; height: 100vh;
            overflow-y: auto; z-index: 200;
            scrollbar-width: thin; scrollbar-color: var(--accent-color) transparent;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .admin-sidebar::-webkit-scrollbar { width: 4px; }
        .admin-sidebar::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }

        .sidebar-logo {
            font-family: var(--font-header); font-size: 1.5rem; color: var(--accent-color);
            letter-spacing: 4px; margin-bottom: 0.3rem; text-align: center;
            text-shadow: 0 0 15px rgba(255,215,0,0.4), 0 0 30px rgba(255,215,0,0.15);
        }
        .sidebar-subtitle {
            font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 3px;
            text-align: center; margin-bottom: 1.5rem; padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-section { margin-bottom: 1.5rem; }
        .nav-section-title {
            font-size: 0.6rem; color: #444; text-transform: uppercase;
            letter-spacing: 3px; margin-bottom: 0.5rem; padding-left: 0.5rem;
        }

        .nav-item {
            display: flex; align-items: center; gap: 0.8rem;
            padding: 0.75rem 1rem; color: #666; cursor: pointer;
            border-radius: 8px; transition: all 0.25s ease;
            font-size: 0.875rem; position: relative; border-left: 3px solid transparent;
        }
        .nav-item:hover {
            background: rgba(255,215,0,0.06); color: #ddd;
            border-left-color: rgba(255,215,0,0.3); padding-left: 1.3rem;
        }
        .nav-item.active {
            background: rgba(255,215,0,0.1); color: var(--accent-color);
            border-left-color: var(--accent-color); padding-left: 1.3rem;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
        }
        .nav-item.active i { filter: drop-shadow(0 0 4px var(--accent-color)); }
        .nav-item i { width: 18px; text-align: center; font-size: 0.9rem; }

        .sidebar-footer { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--glass-border); }
        .user-info {
            display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem;
            background: rgba(255,255,255,0.03); border-radius: 8px;
            border: 1px solid var(--glass-border); margin-bottom: 0.5rem;
        }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color), #b8960a);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #000; font-size: 0.9rem;
            box-shadow: 0 0 12px rgba(255,215,0,0.3); flex-shrink: 0;
        }
        .user-name { font-size: 0.85rem; color: #fff; }
        .user-role { font-size: 0.68rem; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; }

        /* Hamburger toggle (mobile) */
        .sidebar-toggle {
            display: none; position: fixed; top: 1rem; left: 1rem; z-index: 300;
            width: 42px; height: 42px; background: rgba(10,10,10,0.9);
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            border-radius: 8px; color: var(--accent-color); font-size: 1.1rem;
            cursor: pointer; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .sidebar-toggle:hover { background: rgba(255,215,0,0.15); border-color: var(--accent-color); }
        .sidebar-backdrop {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.65); z-index: 150; backdrop-filter: blur(4px);
        }
        .sidebar-backdrop.active { display: block; }

        /* --- MAIN CONTENT --- */
        .admin-main { flex: 1; margin-left: 260px; padding: 2rem; min-height: 100vh; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--glass-border);
            position: relative;
        }
        .page-header::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 80px; height: 1px;
            background: linear-gradient(to right, var(--accent-color), transparent);
        }
        .page-title { font-family: var(--font-header); font-size: 1.8rem; color: #fff; }
        .page-subtitle { color: #555; font-size: 0.82rem; margin-top: 0.3rem; letter-spacing: 1px; }

        /* --- BUTTONS --- */
        .btn {
            padding: 0.6rem 1.2rem; font-family: var(--font-ui); font-size: 0.85rem;
            border: none; border-radius: 6px; cursor: pointer; transition: all 0.25s;
            display: inline-flex; align-items: center; gap: 0.5rem; letter-spacing: 0.5px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent-color); color: #000; font-weight: 600; }
        .btn-primary:hover { box-shadow: 0 0 20px rgba(255,215,0,0.5), 0 4px 15px rgba(255,215,0,0.2); transform: translateY(-2px); }
        .btn-secondary { background: rgba(255,255,255,0.06); color: #ccc; border: 1px solid var(--glass-border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.3); }
        .btn-danger { background: rgba(255,68,68,0.15); color: var(--danger-color); border: 1px solid rgba(255,68,68,0.3); }
        .btn-danger:hover { background: var(--danger-color); color: #fff; box-shadow: 0 0 15px rgba(255,68,68,0.3); }
        .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.75rem; }

        /* --- GLASS CARDS --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .glass-card:hover { border-color: rgba(255,255,255,0.2); box-shadow: 0 8px 40px rgba(0,0,0,0.4); }

        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--glass-border);
        }
        .card-title { font-family: var(--font-header); font-size: 1.1rem; color: var(--accent-color); }

        .data-table { width: 100%; border-collapse: collapse; }

        .data-table th, .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .data-table th {
            color: #888;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .data-table tr:hover { background: rgba(255,255,255,0.02); }

        .data-table img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
        }

        .status-badge {
            padding: 0.3rem 0.7rem; border-radius: 20px; font-size: 0.68rem;
            text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px;
        }
        .status-published { background: rgba(68,255,136,0.15); color: var(--success-color); border: 1px solid rgba(68,255,136,0.3); }
        .status-draft { background: rgba(255,215,0,0.12); color: var(--accent-color); border: 1px solid rgba(255,215,0,0.3); }
        .action-btns { display: flex; gap: 0.5rem; }

        /* --- FORMS --- */
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; color: #999; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.5px; }
        .form-input, .form-textarea, .form-select {
            width: 100%; padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.35); border: 1px solid var(--glass-border);
            border-radius: 8px; color: #fff; font-family: var(--font-ui); font-size: 0.95rem;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none; border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(255,215,0,0.08);
        }
        .form-select option { background: #111; }
        .form-textarea { min-height: 150px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-checkbox { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .form-checkbox input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent-color); }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 1000; display: none; justify-content: center; align-items: center; padding: 2rem;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: rgba(14,14,14,0.97);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-top: 2px solid rgba(255,215,0,0.4);
            border-radius: 16px; width: 100%; max-width: 700px;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
            scrollbar-width: thin; scrollbar-color: var(--accent-color) transparent;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem; border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; background: rgba(14,14,14,0.97); z-index: 10;
        }
        .modal-title { font-family: var(--font-header); font-size: 1.25rem; color: var(--accent-color); text-shadow: 0 0 10px rgba(255,215,0,0.2); }
        .modal-close { background: none; border: none; color: #555; font-size: 1.5rem; cursor: pointer; transition: all 0.2s; line-height: 1; }
        .modal-close:hover { color: var(--danger-color); transform: rotate(90deg); }
        .modal-body { padding: 1.5rem; }
        .modal-footer {
            padding: 1.5rem; border-top: 1px solid var(--glass-border);
            display: flex; justify-content: flex-end; gap: 1rem;
            position: sticky; bottom: 0; background: rgba(14,14,14,0.97);
        }

        /* --- STATS GRID --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 1.5rem 1.5rem 1.2rem; text-align: center; position: relative; overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(255,215,0,0.08); border-color: rgba(255,215,0,0.3); }
        .stat-card::before {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(to right, transparent, var(--accent-color), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .stat-card:hover::before { opacity: 1; }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: var(--accent-color); line-height: 1; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
        .stat-label { color: #555; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 0.5rem; }
        .stat-icon { position: absolute; right: 1.2rem; top: 1.2rem; font-size: 1.5rem; color: rgba(255,215,0,0.08); }

        /* Quick-action cards */
        .quick-actions { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .quick-action-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            border-radius: 10px; padding: 1.2rem; cursor: pointer; transition: all 0.25s;
            display: flex; flex-direction: column; align-items: center; gap: 0.7rem; text-align: center;
        }
        .quick-action-card:hover { background: rgba(255,215,0,0.07); border-color: rgba(255,215,0,0.4); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .quick-action-card i { font-size: 1.4rem; color: var(--accent-color); }
        .quick-action-card span { font-size: 0.8rem; color: #bbb; font-weight: 500; letter-spacing: 0.5px; }

        /* Empty states */
        .empty-state { text-align: center; padding: 3rem 2rem; color: #555; }
        .empty-state i { font-size: 2.5rem; color: rgba(255,215,0,0.2); display: block; margin-bottom: 1rem; }
        .empty-state p { margin-bottom: 1.5rem; font-size: 0.9rem; }

        /* --- LOGIN --- */
        .login-container { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        .login-box {
            background: rgba(10,10,12,0.85);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-top: 2px solid rgba(255,215,0,0.35);
            border-radius: 20px; padding: 3rem; width: 100%; max-width: 420px;
            text-align: center; box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }
        .login-logo {
            font-family: var(--font-header); font-size: 2.2rem; color: var(--accent-color);
            letter-spacing: 6px; margin-bottom: 0.3rem;
            text-shadow: 0 0 20px rgba(255,215,0,0.4), 0 0 40px rgba(255,215,0,0.15);
        }
        .login-subtitle { color: #555; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 2.5rem; }
        .login-box .form-group { text-align: left; }
        .login-error {
            background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.4);
            color: var(--danger-color); padding: 0.8rem 1rem; border-radius: 8px;
            margin-bottom: 1.2rem; font-size: 0.84rem; display: none;
        }

        /* --- TOAST --- */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: rgba(14,14,14,0.95);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 10px;
            padding: 1rem 1.5rem; display: flex; align-items: center; gap: 0.8rem;
            z-index: 2000; transform: translateX(120%); opacity: 0; transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); min-width: 260px;
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.success { border-left: 3px solid var(--success-color); }
        .toast.success i { color: var(--success-color); }
        .toast.error { border-left: 3px solid var(--danger-color); }
        .toast.error i { color: var(--danger-color); }

        /* --- LOADING --- */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .loading-overlay.active { display: flex; }
        /* Arcane Spiral Spinner */
        .arcane-spiral-container { position: relative; width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; }
        .arcane-ring-outer {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, rgba(255,215,0,0.1) 30%, rgba(255,215,0,0.9) 100%);
            mask-image: radial-gradient(transparent 55%, black 56%);
            -webkit-mask-image: radial-gradient(transparent 55%, black 56%);
            animation: spin 1.5s linear infinite;
        }
        .arcane-ring-inner {
            position: absolute; width: 65%; height: 65%; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, rgba(255,255,255,0.1) 40%, rgba(255,215,0,0.7) 100%);
            mask-image: radial-gradient(transparent 50%, black 51%);
            -webkit-mask-image: radial-gradient(transparent 50%, black 51%);
            animation: spin-reverse 2s linear infinite;
        }
        .arcane-core {
            position: absolute; width: 12px; height: 12px; border-radius: 50%;
            background: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color), 0 0 30px #fff;
            animation: arcane-pulse 1.2s ease-in-out infinite alternate;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes spin-reverse { to { transform: rotate(-360deg); } }
        @keyframes arcane-pulse { 0% { transform: scale(0.7); opacity: 0.6; } 100% { transform: scale(1.3); opacity: 1; } }

        /* --- IMAGE GRID --- */
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
        .image-grid-item {
            position: relative; aspect-ratio: 1; border-radius: 8px;
            overflow: hidden; border: 1px solid var(--glass-border); transition: border-color 0.2s;
        }
        .image-grid-item:hover { border-color: var(--accent-color); }
        .image-grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .image-grid-item .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.2s;
        }
        .image-grid-item:hover .overlay { opacity: 1; }

        /* --- TAG INPUT --- */
        .tag-input-wrapper { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.5rem; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; min-height: 45px; }
        .tag-chip { display: inline-flex; align-items: center; gap: 0.3rem; background: var(--accent-color); color: #000; padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.8rem; }
        .tag-chip button { background: none; border: none; color: #000; cursor: pointer; font-size: 0.9rem; }
        .tag-input { flex: 1; min-width: 100px; background: transparent; border: none; color: #fff; font-size: 0.9rem; outline: none; }

        /* --- SCROLLBARS --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.4); border-radius: 10px; }
        * { scrollbar-width: thin; scrollbar-color: rgba(255,215,0,0.4) rgba(0,0,0,0.2); }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .admin-sidebar { transform: translateX(-100%); z-index: 200; }
            .admin-sidebar.active { transform: translateX(0); }
            .admin-main { margin-left: 0; padding: 1rem; padding-top: 4.5rem; }
            .form-row { grid-template-columns: 1fr; }
            .sidebar-toggle { display: flex; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .quick-actions { grid-template-columns: repeat(2, 1fr); }
        }    </style>
</head>
<body>

    <!-- ATMOSPHERIC BACKGROUND -->
    <div class="background-layer"></div>
    <canvas id="particle-canvas"></canvas>

    <!-- LOADING OVERLAY -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="arcane-spiral-container">
            <div class="arcane-ring-outer"></div>
            <div class="arcane-ring-inner"></div>
            <div class="arcane-core"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Success!</span>
    </div>

    <!-- LOGIN VIEW -->
    <div id="login-view">
        <div class="login-container">
            <div class="login-box">
                <div class="login-logo">AETHER</div>
                <div class="login-subtitle">Admin Panel</div>
                <div class="login-error" id="login-error"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="login-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
                <div style="margin-top:1.5rem">
                    <a href="index.html" style="color:#666; font-size:0.8rem; text-decoration:none;">
                        <i class="fas fa-arrow-left"></i> Back to Reader
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- MOBILE SIDEBAR TOGGLE -->
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation">
        <i class="fas fa-bars"></i>
    </button>
    <!-- SIDEBAR BACKDROP -->

            escapeHtml: (unsafe) => {
                if (!unsafe) return '';
                return (unsafe+'')
                     .replace(/&/g, "&amp;")
                     .replace(/</g, "&lt;")
                     .replace(/>/g, "&gt;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#039;");
            },
            escapeAttr: (unsafe) => {
                if (!unsafe) return '';
                return (unsafe+'')
                     .replace(/&/g, "&amp;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#039;");
            },
            uploadImage: async (file, bucketName, folderPath = '') => {
                if (!file) return null;
                const fileExt = file.name.split('.').pop();
                const fileName = `${Math.random().toString(36).substring(2, 15)}_${Date.now()}.${fileExt}`;
                const filePath = folderPath ? `${folderPath}/${fileName}` : fileName;

                const { data, error } = await supabaseClient.storage
                    .from(bucketName)
                    .upload(filePath, file);

                if (error) {
                    throw new Error(`Upload failed: ${error.message}`);
                }

                const { data: publicData } = supabaseClient.storage
                    .from(bucketName)
                    .getPublicUrl(filePath);
                
                return publicData.publicUrl;
            }
        };

                        .from('lore_categories')
                        .select('id')

                const { data: entries } = await supabaseClient.from('lore_entries').select('category_id');

                const orphanedIds = categories.map(c => c.id).filter(id => !usedIds.has(id));

            // Mobile sidebar toggle

            const sidebar = document.getElementById('admin-sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');

            function openSidebar() {
                sidebar.classList.add('active');
                backdrop.classList.add('active');
                toggle.querySelector('i').className = 'fas fa-times';
            }
            function closeSidebar() {
                sidebar.classList.remove('active');
                backdrop.classList.remove('active');
                toggle.querySelector('i').className = 'fas fa-bars';
            }
            window.closeSidebar = closeSidebar;

            if (toggle) toggle.addEventListener('click', () => {
                sidebar.classList.contains('active') ? closeSidebar() : openSidebar();
            });
            if (backdrop) backdrop.addEventListener('click', closeSidebar);
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });

            // Initialize auth

            UI.applyAdminWallpaper();

            // Initialize floating particles
            Particles.init();
        });

        // ==============================================
        // PARTICLES ENGINE
        // ==============================================
        const Particles = {
            init: () => {
                const canvas = document.getElementById('particle-canvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let width, height, particles = [];
                const resize = () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; };
                window.addEventListener('resize', resize); resize();
                class Particle {
                    constructor() { this.reset(); this.y = Math.random() * height; }
                    reset() { this.x = Math.random() * width; this.y = height + 10; this.size = Math.random() * 1.5 + 0.4; this.speedY = Math.random() * 0.4 + 0.1; this.opacity = Math.random() * 0.4 + 0.05; }
                    update() { this.y -= this.speedY; if (this.y < -10) this.reset(); }
                    draw() { ctx.fillStyle = `rgba(255,215,0,${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
                }
                for (let i = 0; i < 25; i++) particles.push(new Particle());
                (function animate() { ctx.clearRect(0, 0, width, height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); })();
            }
        };
    </script>
