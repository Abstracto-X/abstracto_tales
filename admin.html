<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Archives - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #ffffff;
            --accent-color: #ffd700;
            --danger-color: #ff4444;
            --success-color: #44ff88;
            --glass-bg: rgba(15, 15, 15, 0.85);
            --glass-border: rgba(255, 255, 255, 0.12);
            --font-header: 'Cinzel', serif;
            --font-body: 'Lora', serif;
            --font-ui: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            color: #e0e0e0;
            font-family: var(--font-ui);
            min-height: 100vh;
        }

        .admin-container { display: flex; min-height: 100vh; }

        /* SIDEBAR */
        .admin-sidebar {
            width: 260px;
            background: var(--glass-bg);
            border-right: 1px solid var(--glass-border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            font-family: var(--font-header);
            font-size: 1.4rem;
            color: var(--accent-color);
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .sidebar-subtitle {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-section { margin-bottom: 1.5rem; }

        .nav-section-title {
            font-size: 0.65rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            color: #888;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }

        .nav-item.active {
            background: rgba(255,215,0,0.1);
            color: var(--accent-color);
            border-left: 3px solid var(--accent-color);
        }

        .nav-item i { width: 20px; text-align: center; }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
        }

        .user-name { font-size: 0.85rem; color: #fff; }
        .user-role { font-size: 0.7rem; color: var(--accent-color); text-transform: uppercase; }

        /* MAIN CONTENT */
        .admin-main {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
            min-height: 100vh;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .page-title {
            font-family: var(--font-header);
            font-size: 1.8rem;
            color: #fff;
        }

        .page-subtitle {
            color: #666;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        /* BUTTONS */
        .btn {
            padding: 0.6rem 1.2rem;
            font-family: var(--font-ui);
            font-size: 0.85rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary { background: var(--accent-color); color: #000; }
        .btn-primary:hover { box-shadow: 0 0 15px var(--accent-color); transform: translateY(-2px); }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid var(--glass-border);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }

        .btn-danger {
            background: rgba(255, 68, 68, 0.2);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }
        .btn-danger:hover { background: var(--danger-color); color: #fff; }

        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.75rem; }

        /* CARDS & TABLES */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .card-title {
            font-family: var(--font-header);
            font-size: 1.1rem;
            color: var(--accent-color);
        }

        .data-table { width: 100%; border-collapse: collapse; }

        .data-table th, .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .data-table th {
            color: #888;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .data-table tr:hover { background: rgba(255,255,255,0.02); }

        .data-table img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
        }

        .status-badge {
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        .status-published { background: rgba(68, 255, 136, 0.2); color: var(--success-color); }
        .status-draft { background: rgba(255, 215, 0, 0.2); color: var(--accent-color); }

        .action-btns { display: flex; gap: 0.5rem; }

        /* FORMS */
        .form-group { margin-bottom: 1.5rem; }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #aaa;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: #fff;
            font-family: var(--font-ui);
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .form-textarea { min-height: 150px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .form-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal-overlay.active { display: flex; }

        .modal-content {
            background: #1a1a1a;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            background: #1a1a1a;
            z-index: 10;
        }

        .modal-title {
            font-family: var(--font-header);
            font-size: 1.3rem;
            color: var(--accent-color);
        }

        .modal-close {
            background: none;
            border: none;
            color: #666;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover { color: var(--danger-color); }

        .modal-body { padding: 1.5rem; }

        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            position: sticky;
            bottom: 0;
            background: #1a1a1a;
        }

        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-color);
            line-height: 1;
        }

        .stat-label {
            color: #666;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        /* LOGIN */
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .login-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            font-family: var(--font-header);
            font-size: 2rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .login-box .form-group { text-align: left; }

        .login-error {
            background: rgba(255,68,68,0.1);
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 0.8rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1a1a1a;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: var(--success-color); }
        .toast.success i { color: var(--success-color); }
        .toast.error { border-color: var(--danger-color); }
        .toast.error i { color: var(--danger-color); }

        /* LOADING */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .loading-overlay.active { display: flex; }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,215,0,0.2);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* IMAGE GRID */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }

        .image-grid-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .image-grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-grid-item .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .image-grid-item:hover .overlay { opacity: 1; }

        /* TAG INPUT */
        .tag-input-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.5rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            min-height: 45px;
        }

        .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: var(--accent-color);
            color: #000;
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .tag-chip button {
            background: none;
            border: none;
            color: #000;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .tag-input {
            flex: 1;
            min-width: 100px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .admin-sidebar {
                transform: translateX(-100%);
                z-index: 100;
            }
            .admin-sidebar.active { transform: translateX(0); }
            .admin-main { margin-left: 0; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- LOADING OVERLAY -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Success!</span>
    </div>

    <!-- LOGIN VIEW -->
    <div id="login-view">
        <div class="login-container">
            <div class="login-box">
                <div class="login-logo">AETHER</div>
                <div class="login-subtitle">Admin Panel</div>
                <div class="login-error" id="login-error"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="login-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
                <div style="margin-top:1.5rem">
                    <a href="index.html" style="color:#666; font-size:0.8rem; text-decoration:none;">
                        <i class="fas fa-arrow-left"></i> Back to Reader
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN VIEW -->
    <div id="admin-view" style="display:none;">
        <div class="admin-container">
            <!-- SIDEBAR -->
            <aside class="admin-sidebar" id="admin-sidebar">
                <div class="sidebar-logo">AETHER</div>
                <div class="sidebar-subtitle">Admin Panel</div>

                <nav>
                    <div class="nav-section">
                        <div class="nav-section-title">Overview</div>
                        <div class="nav-item active" data-view="dashboard">
                            <i class="fas fa-home"></i> Dashboard
                        </div>
                    </div>

                    <div class="nav-section">
                        <div class="nav-section-title">Content</div>
                        <div class="nav-item" data-view="stories">
                            <i class="fas fa-book"></i> Stories
                        </div>
                        <div class="nav-item" data-view="chapters">
                            <i class="fas fa-file-alt"></i> Chapters
                        </div>
                        <div class="nav-item" data-view="characters">
                            <i class="fas fa-users"></i> Characters
                        </div>
                    </div>

                    <div class="nav-section">
                        <div class="nav-section-title">World Building</div>
                        <div class="nav-item" data-view="lore">
                            <i class="fas fa-scroll"></i> Lore
                        </div>
                        <div class="nav-item" data-view="timeline">
                            <i class="fas fa-stream"></i> Timeline
                        </div>
                        <div class="nav-item" data-view="maps">
                            <i class="fas fa-map"></i> Maps
                        </div>
                    </div>

                    <div class="nav-section">
                        <div class="nav-section-title">Media</div>
                        <div class="nav-item" data-view="gallery">
                            <i class="fas fa-images"></i> Gallery
                        </div>
                        <div class="nav-item" data-view="wallpapers">
                            <i class="fas fa-paint-brush"></i> Wallpapers
                        </div>
                    </div>

                    <div class="nav-section">
                        <div class="nav-section-title">Settings</div>
                        <div class="nav-item" data-view="profile">
                            <i class="fas fa-user-edit"></i> Author Profile
                        </div>
                    </div>
                </nav>

                <div class="sidebar-footer">
                    <div class="user-info">
                        <div class="user-avatar" id="user-avatar">A</div>
                        <div>
                            <div class="user-name" id="user-name">Admin</div>
                            <div class="user-role">Administrator</div>
                        </div>
                    </div>
                    <div class="nav-item" onclick="Auth.logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </div>
                    <div class="nav-item" onclick="window.location.href='index.html'">
                        <i class="fas fa-eye"></i> View Site
                    </div>
                </div>
            </aside>

            <!-- MAIN CONTENT -->
            <main class="admin-main" id="admin-content">
                <!-- Content rendered by JS -->
            </main>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal-overlay" onclick="if(event.target === this) Modal.close()">
        <div class="modal-content" id="modal-content">
            <!-- Modal content rendered by JS -->
        </div>
    </div>

    <!-- SUPABASE SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ==============================================
        // SUPABASE CLIENT
        // ==============================================
        const SUPABASE_URL = 'https://gdivyqfhgashkqcqqnas.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkaXZ5cWZoZ2FzaGtxY3FxbmFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk4MTg1MDAsImV4cCI6MjA2NTM5NDUwMH0.sb_publishable_pumorCjNkGt1RV_Ygfq30A_IFtVz_Lt';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==============================================
        // STATE
        // ==============================================
        const State = {
            user: null,
            profile: null,
            currentView: 'dashboard',
            stories: [],
            characters: [],
            selectedStoryId: null,
            selectedCharacterId: null
        };

        // ==============================================
        // UI HELPERS
        // ==============================================
        const UI = {
            showLoading: () => document.getElementById('loading-overlay').classList.add('active'),
            hideLoading: () => document.getElementById('loading-overlay').classList.remove('active'),
            
            showToast: (message, type = 'success') => {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toast-message');
                toast.className = `toast ${type}`;
                toastMsg.textContent = message;
                toast.querySelector('i').className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }
        };

        // ==============================================
        // MODAL SYSTEM
        // ==============================================
        const Modal = {
            open: (title, bodyHtml, footerHtml = '') => {
                const modal = document.getElementById('modal-content');
                modal.innerHTML = `
                    <div class="modal-header">
                        <h3 class="modal-title">${title}</h3>
                        <button class="modal-close" onclick="Modal.close()">&times;</button>
                    </div>
                    <div class="modal-body">${bodyHtml}</div>
                    ${footerHtml ? `<div class="modal-footer">${footerHtml}</div>` : ''}
                `;
                document.getElementById('modal-overlay').classList.add('active');
            },

            close: () => {
                document.getElementById('modal-overlay').classList.remove('active');
            },

            confirm: (message) => {
                return new Promise((resolve) => {
                    Modal.open('Confirm', `<p style="margin-bottom:1rem">${message}</p>`, `
                        <button class="btn btn-secondary" onclick="Modal.close(); window._confirmResolve(false)">Cancel</button>
                        <button class="btn btn-danger" onclick="Modal.close(); window._confirmResolve(true)">Delete</button>
                    `);
                    window._confirmResolve = resolve;
                });
            }
        };

        // ==============================================
        // AUTH
        // ==============================================
        const Auth = {
            init: async () => {
                const { data: { session } } = await supabase.auth.getSession();
                
                if (session) {
                    State.user = session.user;
                    await Auth.loadProfile();
                } else {
                    Auth.showLoginView();
                }

                supabase.auth.onAuthStateChange(async (event, session) => {
                    if (event === 'SIGNED_IN' && session) {
                        State.user = session.user;
                        await Auth.loadProfile();
                    } else if (event === 'SIGNED_OUT') {
                        State.user = null;
                        State.profile = null;
                        Auth.showLoginView();
                    }
                });
            },

            loadProfile: async () => {
                try {
                    let { data, error } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('id', State.user.id)
                        .single();
                    
                    // If the profile doesn't exist, automatically generate it
                    if (error && error.code === 'PGRST116') {
                        const { data: newProf, error: insErr } = await supabase
                            .from('profiles')

                                <select class="form-select" onchange="State.selectedStoryId = this.value; State.selectedCharacterId = null; Views.render('gallery')">
                                    ${stories.map(s => `<option value="${s.id}" ${s.id === State.selectedStoryId ? 'selected' : ''}>${s.title}</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-group" style="margin-bottom:0">
                                <label class="form-label">Select Character</label>
                                <select class="form-select" onchange="State.selectedCharacterId = this.value; Views.render('gallery')">
                                    ${characters.map(c => `<option value="${c.id}" ${c.id === State.selectedCharacterId ? 'selected' : ''}>${c.name}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="glass-card">
                        <div class="card-header">
                            <h3 class="card-title">${characters.find(c => c.id === State.selectedCharacterId)?.name || 'Character'} Gallery</h3>
                            <span style="color:#666">${images.length} image(s)</span>
                        </div>
                        <div class="image-grid">
                            ${images.map(img => `
                                <div class="image-grid-item">
                                    <img src="${img.image_url}" alt="">
                                    <div class="overlay">
                                        <button class="btn btn-secondary btn-sm" onclick="Forms.galleryImageForm('${img.id}')"><i class="fas fa-edit"></i></button>
                                    </div>
                                </div>
                            `).join('') || '<p style="grid-column:1/-1;text-align:center;color:#666;padding:2rem">No images yet</p>'}
                        </div>
                    </div>
                `;
            },

            wallpapers: async (container) => {
                const stories = await DB.getStories();
                State.stories = stories;

                if (stories.length === 0) {
                    container.innerHTML = `
                        <div class="page-header"><div><h1 class="page-title">Wallpapers</h1></div></div>
                        <div class="glass-card"><p style="text-align:center;color:#666">Create a story first.</p></div>
                    `;
                    return;
                }

                State.selectedStoryId = State.selectedStoryId || stories[0].id;
                const wallpapers = await DB.getWallpapers(State.selectedStoryId);

                container.innerHTML = `
                    <div class="page-header">
                        <div>
                            <h1 class="page-title">Wallpapers</h1>
                            <p class="page-subtitle">Background images for stories</p>
                        </div>
                        <button class="btn btn-primary" onclick="Forms.wallpaperForm()">
                            <i class="fas fa-plus"></i> Add Wallpaper
                        </button>
                    </div>

                    <div class="glass-card" style="margin-bottom:1rem">
                        <label class="form-label">Select Story</label>
                        <select class="form-select" onchange="State.selectedStoryId = this.value; Views.render('wallpapers')">
                            ${stories.map(s => `<option value="${s.id}" ${s.id === State.selectedStoryId ? 'selected' : ''}>${s.title}</option>`).join('')}
                        </select>
                    </div>

                    <div class="glass-card">
                        <div class="image-grid">
                            ${wallpapers.map(wp => `
                                <div class="image-grid-item" style="aspect-ratio:16/9">
                                    <img src="${wp.image_url}" alt="">
                                    <div class="overlay">
                                        <button class="btn btn-secondary btn-sm" onclick="Forms.wallpaperForm('${wp.id}')"><i class="fas fa-edit"></i></button>
                                    </div>
                                </div>
                            `).join('') || '<p style="grid-column:1/-1;text-align:center;color:#666;padding:2rem">No wallpapers yet</p>'}
                        </div>
                    </div>
                `;
            },

            lore: async (container) => {
                const stories = await DB.getStories();
                State.stories = stories;

                if (stories.length === 0) {
                    container.innerHTML = `
                        <div class="page-header"><div><h1 class="page-title">Lore</h1></div></div>
                        <div class="glass-card"><p style="text-align:center;color:#666">Create a story first.</p></div>
                    `;
                    return;
                }

                State.selectedStoryId = State.selectedStoryId || stories[0].id;
                const entries = await DB.getLoreEntries(State.selectedStoryId);

                container.innerHTML = `
                    <div class="page-header">
                        <div>
                            <h1 class="page-title">Lore Encyclopedia</h1>
                            <p class="page-subtitle">World-building entries</p>
                        </div>
                        <button class="btn btn-primary" onclick="Forms.loreForm()">
                            <i class="fas fa-plus"></i> Add Entry
                        </button>
                    </div>

                    <div class="glass-card" style="margin-bottom:1rem">
                        <label class="form-label">Select Story</label>
                        <select class="form-select" onchange="State.selectedStoryId = this.value; Views.render('lore')">
                            ${stories.map(s => `<option value="${s.id}" ${s.id === State.selectedStoryId ? 'selected' : ''}>${s.title}</option>`).join('')}
                        </select>
                    </div>

                    <div class="glass-card">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Image</th>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${entries.map(e => `
                                    <tr>
                                        <td><img src="${e.image_url || 'https://via.placeholder.com/50x50?text=?'}" alt=""></td>
                                        <td><strong>${e.title}</strong></td>
                                        <td>${e.lore_categories?.name || '-'}</td>
                                        <td>
                                            <div class="action-btns">
                                                <button class="btn btn-secondary btn-sm" onclick="Forms.loreForm('${e.id}')" title="Edit"><i class="fas fa-edit"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('') || '<tr><td colspan="4" style="text-align:center;color:#666">No lore entries yet</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            },

            timeline: async (container) => {
                const stories = await DB.getStories();
                State.stories = stories;

                if (stories.length === 0) {
                    container.innerHTML = `
                        <div class="page-header"><div><h1 class="page-title">Timeline</h1></div></div>
                        <div class="glass-card"><p style="text-align:center;color:#666">Create a story first.</p></div>
                    `;
                    return;
                }

                State.selectedStoryId = State.selectedStoryId || stories[0].id;
                const events = await DB.getTimelineEvents(State.selectedStoryId);

                container.innerHTML = `
                    <div class="page-header">
                        <div>
                            <h1 class="page-title">Timeline</h1>
                            <p class="page-subtitle">Story events in chronological order</p>
                        </div>
                        <button class="btn btn-primary" onclick="Forms.timelineForm()">
                            <i class="fas fa-plus"></i> Add Event
                        </button>
                    </div>

                    <div class="glass-card" style="margin-bottom:1rem">
                        <label class="form-label">Select Story</label>
                        <select class="form-select" onchange="State.selectedStoryId = this.value; Views.render('timeline')">
                            ${stories.map(s => `<option value="${s.id}" ${s.id === State.selectedStoryId ? 'selected' : ''}>${s.title}</option>`).join('')}
                        </select>
                    </div>

                    <div class="glass-card">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Order</th>
                                    <th>Date/Era</th>
                                    <th>Title</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${events.map(e => `
                                    <tr>
                                        <td>${e.event_order}</td>
                                        <td><strong>${e.event_date}</strong></td>
                                        <td>${e.title}</td>
                                        <td>
                                            <div class="action-btns">
                                                <button class="btn btn-secondary btn-sm" onclick="Forms.timelineForm('${e.id}')" title="Edit"><i class="fas fa-edit"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('') || '<tr><td colspan="4" style="text-align:center;color:#666">No timeline events yet</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            },

            maps: async (container) => {
                const stories = await DB.getStories();
                State.stories = stories;

                if (stories.length === 0) {
                    container.innerHTML = `
                        <div class="page-header"><div><h1 class="page-title">Maps</h1></div></div>
                        <div class="glass-card"><p style="text-align:center;color:#666">Create a story first.</p></div>
                    `;
                    return;
                }

                State.selectedStoryId = State.selectedStoryId || stories[0].id;
                const maps = await DB.getMaps(State.selectedStoryId);

                container.innerHTML = `
                    <div class="page-header">
                        <div>
                            <h1 class="page-title">Maps</h1>
                            <p class="page-subtitle">World maps and locations</p>
                        </div>
                        <button class="btn btn-primary" onclick="Forms.mapForm()">
                            <i class="fas fa-plus"></i> Add Map
                        </button>
                    </div>

                    <div class="glass-card" style="margin-bottom:1rem">
                        <label class="form-label">Select Story</label>
                        <select class="form-select" onchange="State.selectedStoryId = this.value; Views.render('maps')">
                            ${stories.map(s => `<option value="${s.id}" ${s.id === State.selectedStoryId ? 'selected' : ''}>${s.title}</option>`).join('')}
                        </select>
                    </div>

                    <div class="glass-card">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Preview</th>
                                    <th>Name</th>
                                    <th>Primary</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${maps.map(m => `
                                    <tr>
                                        <td><img src="${m.image_url}" alt="" style="width:80px;height:50px;object-fit:cover;border-radius:4px"></td>
                                        <td><strong>${m.map_name}</strong></td>
                                        <td>${m.is_primary ? '<i class="fas fa-check" style="color:var(--success-color)"></i>' : ''}</td>
                                        <td>
                                            <div class="action-btns">
                                                <button class="btn btn-secondary btn-sm" onclick="Forms.mapForm('${m.id}')" title="Edit"><i class="fas fa-edit"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('') || '<tr><td colspan="4" style="text-align:center;color:#666">No maps yet</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            },

            profile: async (container) => {
                const author = await DB.getAuthorProfile();

                if (!author) {
                    container.innerHTML = `
                        <div class="page-header"><div><h1 class="page-title">Author Profile</h1></div></div>
                        <div class="glass-card"><p style="text-align:center;color:#666">Profile not found.</p></div>
                    `;
                    return;
                }

                container.innerHTML = `
                    <div class="page-header">
                        <div>
                            <h1 class="page-title">Author Profile</h1>
                            <p class="page-subtitle">Your public author information</p>
                        </div>
                    </div>

                    <div class="glass-card">
                        <div class="card-header">
                            <h3 class="card-title">Profile Information</h3>
                            <button class="btn btn-secondary btn-sm" onclick="Views.editProfile('${author.id}')">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                        </div>
                        <div style="display:flex;gap:2rem;align-items:flex-start">
                            <img src="${author.avatar_url || 'https://via.placeholder.com/120x120?text=Avatar'}" 
                                 style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid var(--accent-color)">
                            <div>
                                <h2 style="font-family:var(--font-header);color:var(--accent-color);margin-bottom:0.5rem">${author.display_name || 'No name set'}</h2>
                                <p style="color:#aaa;line-height:1.6;max-width:500px">${author.bio || 'No bio set'}</p>
                            </div>
                        </div>
                    </div>

                    <div class="glass-card">
                        <div class="card-header">
                            <h3 class="card-title">Social Links</h3>
                            <button class="btn btn-primary btn-sm" onclick="Forms.authorLinkForm('${author.id}')">
                                <i class="fas fa-plus"></i> Add Link
                            </button>
                        </div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Icon</th>
                                    <th>Platform</th>
                                    <th>URL</th>
                                    <th>Note</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${author.links.map(l => `
                                    <tr>
                                        <td><img src="${l.icon_url || 'https://via.placeholder.com/40?text=?'}" style="width:40px;height:40px;border-radius:8px"></td>
                                        <td><strong>${l.platform_name}</strong></td>
                                        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis"><a href="${l.url}" target="_blank" style="color:var(--accent-color)">${l.url}</a></td>
                                        <td>${l.note || '-'}</td>
                                        <td>
                                            <div class="action-btns">
                                                <button class="btn btn-secondary btn-sm" onclick="Forms.authorLinkForm('${author.id}', '${l.id}')" title="Edit"><i class="fas fa-edit"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('') || '<tr><td colspan="5" style="text-align:center;color:#666">No links yet</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            },

            editProfile: async (id) => {
                const { data: author } = await supabase.from('profiles').select('*').eq('id', id).single();
                if (!author) return;

                const html = `
                    <div class="form-group">
                        <label class="form-label">Display Name</label>
                        <input type="text" class="form-input" id="f-display_name" value="${author.display_name || ''}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Bio</label>
                        <textarea class="form-textarea" id="f-bio">${author.bio || ''}</textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Avatar URL</label>
                        <input type="text" class="form-input" id="f-avatar_url" value="${author.avatar_url || ''}">
                    </div>
                `;

                const footer = `
                    <button class="btn btn-secondary" onclick="Modal.close()">Cancel</button>
                    <button class="btn btn-primary" onclick="Views.saveProfile('${id}')"><i class="fas fa-save"></i> Save</button>
                `;

                Modal.open('Edit Profile', html, footer);
            },

            saveProfile: async (id) => {
                try {
                    UI.showLoading();
                    const record = {
                        display_name: document.getElementById('f-display_name').value,
                        bio: document.getElementById('f-bio').value,
                        avatar_url: document.getElementById('f-avatar_url').value
                    };
                    await DB.saveAuthorProfile(id, record);
                    Modal.close();
                    UI.showToast('Profile saved!');
                    Views.render('profile');
                } catch (err) {
                    UI.showToast(err.message, 'error');
                } finally {
                    UI.hideLoading();
                }
            }
        };

        // ==============================================
        // INITIALIZATION
        // ==============================================
        document.addEventListener('DOMContentLoaded', () => {
            // Login form handler
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                await Auth.login(email, password);
            });

            // Nav click handlers
            document.querySelectorAll('.nav-item[data-view]').forEach(item => {
                item.addEventListener('click', () => {
                    Views.render(item.dataset.view);
                });
            });

            // Initialize auth
            Auth.init();
        });
    </script>
</body>
</html>
