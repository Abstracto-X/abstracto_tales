<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Aether Archives</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- SUPABASE JS CLIENT -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* --- CORE VARIABLES --- */
        :root {
            --primary-color: #ffffff;
            --accent-color: #ffd700;
            --glass-bg: rgba(15, 15, 15, 0.70); 
            --glass-border: rgba(255, 255, 255, 0.12);
            --font-header: 'Cinzel', serif;
            --font-body: 'Lora', serif;
            --font-ui: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: var(--font-ui);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* --- TRANSITION CURTAIN --- */
        #transition-curtain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 9999; opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease-in-out;
        }
        body.is-transitioning #transition-curtain { opacity: 1; pointer-events: all; }

        /* --- BACKGROUND --- */
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .background-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background-color: #111;
            background-size: cover; background-position: center;
            transition: filter 0.6s ease;
        }
        
        #app-container { 
            position: relative; width: 100%; height: 100%; z-index: 10;
            display: flex; flex-direction: column; padding: 1.5rem 2rem;
            transition: opacity 0.1s linear;
        }

        /* --- UI UTILITIES --- */
        .glass-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: background 0.3s, border-color 0.3s;
        }
        .glass-box:hover {
            background: rgba(20, 20, 20, 0.8);
            border-color: rgba(255, 255, 255, 0.25);
        }

        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000;
            display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease;
            pointer-events: none;
        }
        #lightbox.active { opacity: 1; pointer-events: all; }
        #lightbox-img {
            max-width: 95%; max-height: 95vh;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 1px solid #333;
            transform: scale(0.95); transition: transform 0.3s ease;
        }
        #lightbox.active #lightbox-img { transform: scale(1); }

        /* --- HEADER --- */
        #main-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.8rem 2rem; margin-bottom: 0.5rem; flex-shrink: 0; z-index: 20;
            height: 70px; transition: opacity 0.3s;
        }
        .logo { 
            font-family: var(--font-header); font-size: 1.6rem; letter-spacing: 4px; 
            color: var(--primary-color); text-shadow: 0 0 10px rgba(255,255,255,0.2); cursor: pointer;
        }
        .back-btn-wrapper {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            font-family: var(--font-ui); text-transform: uppercase; letter-spacing: 2px;
            font-size: 0.75rem; color: #a0a0a0; transition: color 0.3s;
        }
        .back-btn-wrapper:hover { color: var(--accent-color); }
        .header-controls { display: flex; align-items: center; gap: 1rem; }

        /* --- STAGE --- */
        #content-stage {
            flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px;
            display: flex; flex-direction: column;
            scrollbar-width: thin; scrollbar-color: var(--accent-color) rgba(0,0,0,0.3);
        }
        #content-stage::-webkit-scrollbar { width: 6px; }
        #content-stage::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        #content-stage::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }

        /* --- BUTTONS --- */
        .btn-large {
            padding: 0.8rem 2rem; font-family: var(--font-header); font-size: 0.9rem; letter-spacing: 2px;
            background: transparent; border: 1px solid var(--accent-color);
            color: var(--primary-color); cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 0.8rem; text-decoration: none;
            justify-content: center;
        }
        .btn-large:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 15px var(--accent-color); }
        
        .btn-danger { border-color: #ff4444; color: #ff4444; }
        .btn-danger:hover { background: #ff4444; color: #fff; box-shadow: 0 0 15px #ff4444; }
        .btn-success { border-color: #44ff44; color: #44ff44; }
        .btn-success:hover { background: #44ff44; color: #000; box-shadow: 0 0 15px #44ff44; }

        /* --- HOME: STORY GRID --- */
        .story-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem; padding: 2rem 0; max-width: 1400px; margin: 0 auto; width: 100%;
            perspective: 1000px;
        }
        .story-card {
            position: relative; height: 450px; border-radius: 16px; overflow: hidden;
            cursor: pointer; transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); background: #000;
        }
        .story-card img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; transition: transform 0.7s ease, filter 0.5s ease; opacity: 0.8;
        }
        .card-info {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 2rem;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 40%, transparent 100%);
            transform: translateY(20px); transition: transform 0.5s ease; z-index: 2;
        }
        .card-title {
            font-family: var(--font-header); font-size: 1.6rem; color: #fff;
            margin-bottom: 0.5rem; text-shadow: 0 2px 10px rgba(0,0,0,0.8); transition: color 0.3s; line-height: 1.1;
        }
        .card-desc {
            font-size: 0.9rem; color: #ccc; line-height: 1.5; opacity: 0;
            transform: translateY(10px); transition: all 0.4s ease 0.1s; max-height: 0;
        }
        .story-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(255, 215, 0, 0.2); border-color: var(--accent-color); }
        .story-card:hover img { transform: scale(1.15); filter: brightness(1.1); opacity: 1; }
        .story-card:hover .card-info { transform: translateY(0); }
        .story-card:hover .card-title { color: var(--accent-color); }
        .story-card:hover .card-desc { opacity: 1; transform: translateY(0); max-height: 100px; }

        /* --- AUTHOR SECTION --- */
        .author-section {
            max-width: 1000px; margin: 4rem auto 2rem auto; padding: 2.5rem;
            display: grid; grid-template-columns: 200px 1fr; gap: 3rem; align-items: start;
        }
        .author-img-wrapper {
            width: 180px; height: 180px; border-radius: 50%; border: 3px solid var(--accent-color);
            padding: 5px; box-shadow: 0 0 25px rgba(255, 215, 0, 0.15); margin: 0 auto;
        }
        .author-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background-color: #111; }
        .author-info h2 { font-family: var(--font-header); color: var(--accent-color); margin-bottom: 1rem; font-size: 2rem; line-height: 1; }
        .author-bio { color: #ccc; line-height: 1.6; margin-bottom: 2rem; font-size: 1.05rem; }
        .author-links { display: flex; flex-direction: column; gap: 1rem; width: 100%; }
        .link-row {
            display: flex; align-items: center; gap: 1.5rem; padding: 1rem; text-decoration: none;
            transition: transform 0.2s, background 0.2s; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
        }
        .link-row:hover { background: rgba(255, 255, 255, 0.08); transform: translateX(10px); border-color: var(--accent-color); }
        .social-icon { width: 48px; height: 48px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .link-details { display: flex; flex-direction: column; }
        .link-name { font-family: var(--font-header); color: #fff; font-size: 1.1rem; }
        .link-note { font-size: 0.85rem; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        /* --- STORY HUB --- */
        .story-hub-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 2rem; gap: 1.5rem; }
        .story-hub-layout {
            display: grid; grid-template-columns: 220px 1fr; gap: 2.5rem;
            width: 100%; max-width: 850px; padding: 2rem !important; align-items: center;
        }
        .hub-cover { width: 100%; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .hub-details { display: flex; flex-direction: column; justify-content: center; }
        .hub-details h1 { font-family: var(--font-header); font-size: 2.2rem; margin-bottom: 0.5rem; line-height: 1.1; color: #fff; }
        .hub-meta { color: var(--accent-color); margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; font-weight: 600; opacity: 0.9; }
        .hub-synopsis { font-size: 1rem; line-height: 1.6; color: #ddd; margin-bottom: 2rem; max-height: 200px; overflow-y: auto; padding-right: 10px; }
        .hub-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
        .world-hub-bar { width: 100%; max-width: 850px; padding: 1rem 2rem; text-align: center; }
        .world-hub-bar .bar-title { font-family: var(--font-header); font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; color: #aaa; margin-bottom: 1rem; }
        .world-hub-bar .bar-actions { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
        .world-hub-bar .btn-large { font-size: 0.8rem; padding: 0.6rem 1.5rem; border-color: rgba(255,255,255,0.2); }

        /* --- READER --- */
        .reader-layout { display: flex; gap: 2rem; height: 100%; max-width: 1300px; margin: 0 auto; width: 100%; position: relative; }
        .reader-sidebar { width: 220px; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.05); padding-right: 0.5rem; flex-shrink: 0; transition: width 0.3s, opacity 0.3s; }
        .chapter-list-item { padding: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-size: 0.85rem; transition: 0.2s; color: #888; }
        .chapter-list-item:hover { color: var(--accent-color); padding-left: 1rem; }
        .chapter-list-item.active { border-left: 3px solid var(--accent-color); color: #fff; background: rgba(255,215,0,0.05); }
        .reader-content { flex: 1; max-width: 800px; margin: 0 auto; padding: 3rem 4rem; color: #d0d0d0; overflow-y: auto; position: relative; transition: max-width 0.3s; }
        .reader-toolbar { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        .rt-btn { background: transparent; border: none; color: #666; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .rt-btn:hover, .rt-btn.active { color: var(--accent-color); }
        .font-menu { position: absolute; top: 60px; right: 20px; background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 6px; display: none; flex-direction: column; gap: 8px; z-index: 50; width: 120px; }
        .font-option { cursor: pointer; font-size: 0.8rem; color: #aaa; padding: 4px; border-radius: 4px; }
        .font-option:hover { background: #333; color: #fff; }
        body.focus-active #main-header { opacity: 0; pointer-events: none; }
        body.focus-active .reader-sidebar { width: 0; padding: 0; opacity: 0; overflow: hidden; }
        body.focus-active .reader-content { max-width: 900px; background: rgba(10, 10, 10, 0.9); }
        .text-sm { font-size: 1rem; } .text-md { font-size: 1.2rem; } .text-lg { font-size: 1.4rem; }
        .font-serif { font-family: var(--font-body); } .font-sans { font-family: var(--font-ui); }

        /* --- GALLERY --- */
        .char-grid { display: flex; flex-wrap: wrap; gap: 2rem; justify-content: center; max-width: 1200px; margin: 0 auto; }
        .char-card {
            width: 220px; height: 350px; position: relative; border-radius: 10px;
            cursor: pointer; background: #000; border: 1px solid rgba(255,255,255,0.1);
            transform-style: preserve-3d; transition: transform 0.1s;
        }
        .char-card.reset-anim { transition: transform 0.5s ease; }
        .char-card-inner { width: 100%; height: 100%; position: relative; overflow: hidden; border-radius: 10px; transform: translateZ(20px); }
        .char-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .char-card:hover img { transform: scale(1.1); filter: brightness(0.6); }
        .char-info-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 80%, transparent 100%);
            padding: 1.2rem; transform: translateY(60%) translateZ(30px); transition: transform 0.3s ease;
        }
        .char-card:hover .char-info-overlay { transform: translateY(0) translateZ(30px); }
        .char-name { font-family: var(--font-header); font-size: 1.1rem; color: #fff; }
        .char-role { color: var(--accent-color); font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        .char-bio-preview { font-size: 0.75rem; line-height: 1.4; color: #ccc; opacity: 0; transition: opacity 0.3s 0.1s; margin-top: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .char-card:hover .char-bio-preview { opacity: 1; }

        .char-profile-hero { display: grid; grid-template-columns: 240px 1fr; gap: 2.5rem; padding: 2rem; max-width: 900px; margin: 0 auto 2rem auto; align-items: start; }
        .hero-img-container { width: 100%; aspect-ratio: 3 / 4; border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        .hero-name { font-family: var(--font-header); font-size: 2.5rem; line-height: 1; color: #fff; margin-bottom: 0.5rem; }
        .hero-role { font-family: var(--font-ui); text-transform: uppercase; letter-spacing: 2px; color: var(--accent-color); font-size: 0.8rem; margin-bottom: 1.5rem; opacity: 0.9; }
        .hero-bio { font-family: var(--font-body); font-size: 1rem; line-height: 1.6; color: #d0d0d0; white-space: pre-line; background: rgba(0,0,0,0.2); padding: 1.2rem; border-radius: 6px; max-height: 300px; overflow-y: auto; }
        .sub-gallery-grid { column-count: 3; column-gap: 1rem; max-width: 900px; margin: 0 auto; }
        .gallery-item { break-inside: avoid; margin-bottom: 1rem; border-radius: 6px; overflow: hidden; transition: transform 0.3s; cursor: zoom-in; border: 1px solid rgba(255,255,255,0.1); }
        .gallery-item:hover { transform: scale(1.02); border-color: var(--accent-color); }
        .gallery-item img { display: block; width: 100%; }

        /* --- LORE --- */
        .lore-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; max-width: 1200px; width: 100%; margin: 1rem auto; }
        .lore-card { display: flex; flex-direction: column; height: 350px; overflow: hidden; cursor: pointer; position: relative; transition: transform 0.3s; }
        .lore-card:hover { transform: translateY(-8px); border-color: var(--accent-color); }
        .lore-card-img { width: 100%; height: 60%; object-fit: cover; transition: transform 0.5s; }
        .lore-card:hover .lore-card-img { transform: scale(1.1); }
        .lore-card-content { padding: 1.2rem; flex: 1; display: flex; flex-direction: column; border-top: 1px solid rgba(255,255,255,0.05); }
        .lore-card-content .title { font-family: var(--font-header); font-size: 1.2rem; color: #fff; margin-bottom: 0.2rem; }
        .lore-card-content .type { font-size: 0.7rem; text-transform: uppercase; color: var(--accent-color); margin-bottom: 0.5rem; letter-spacing: 1px; }
        .lore-card-content .desc { font-size: 0.85rem; color: #bbb; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .lore-wiki-layout { max-width: 900px; margin: 0 auto; padding-bottom: 3rem; }
        .lore-wiki-header { position: relative; width: 100%; height: 300px; border-radius: 12px; overflow: hidden; margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.1); }
        .lore-wiki-header img { width: 100%; height: 100%; object-fit: cover; }
        .lore-wiki-body { padding: 3rem; }
        .lore-wiki-title { font-family: var(--font-header); font-size: 2.5rem; color: var(--accent-color); margin-bottom: 0.5rem; }
        .lore-wiki-type { font-family: var(--font-ui); text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
        .lore-wiki-text { font-family: var(--font-body); font-size: 1.1rem; line-height: 1.8; color: #d0d0d0; white-space: pre-line; }

        /* --- TIMELINE --- */
        .timeline-wrapper { position: relative; max-width: 800px; margin: 2rem auto; padding: 2rem 0; }
        .timeline-path { position: absolute; left: 50%; top: 0; transform: translateX(-50%); width: 2px; height: 100%; background: linear-gradient(to bottom, transparent, var(--accent-color), transparent); opacity: 0.3; }
        .timeline-node { position: relative; width: 100%; margin-bottom: 4rem; display: flex; justify-content: center; }
        .timeline-content { width: 45%; padding: 1.5rem; position: relative; z-index: 2; }
        .node-left .timeline-content { margin-right: auto; text-align: right; border-right: 3px solid var(--accent-color); }
        .node-right .timeline-content { margin-left: auto; text-align: left; border-left: 3px solid var(--accent-color); }
        .timeline-dot { position: absolute; left: 50%; top: 1.5rem; width: 16px; height: 16px; background: #000; border: 2px solid var(--accent-color); border-radius: 50%; transform: translateX(-50%); z-index: 5; box-shadow: 0 0 10px var(--accent-color); }
        .timeline-content .date { font-weight: bold; color: var(--accent-color); margin-bottom: 0.5rem; font-family: var(--font-ui); letter-spacing: 1px; }
        .timeline-content .title { font-family: var(--font-header); font-size: 1.4rem; margin-bottom: 0.5rem; color: #fff; }
        .timeline-content .desc { font-size: 0.95rem; line-height: 1.6; color: #ccc; }
        .timeline-char-box {
            position: absolute; top: 0; width: 40%; display: flex; align-items: center; gap: 10px; padding: 10px;
            cursor: pointer; opacity: 0.7; transition: all 0.3s; border: 1px solid transparent; border-radius: 8px;
        }
        .node-left .timeline-char-box { left: 55%; text-align: left; flex-direction: row; }
        .node-right .timeline-char-box { right: 55%; text-align: right; flex-direction: row-reverse; }
        .timeline-char-box:hover { opacity: 1; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); transform: scale(1.02); }
        .timeline-char-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--glass-border); }
        .timeline-char-info { display: flex; flex-direction: column; }
        .timeline-char-name { font-family: var(--font-header); font-size: 0.9rem; color: #fff; }
        .timeline-char-role { font-size: 0.7rem; color: var(--accent-color); text-transform: uppercase; }

        /* --- MAPS --- */
        .map-layout { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .map-selector { flex-shrink: 0; padding: 0.5rem; text-align: center; background: rgba(0,0,0,0.3); display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; }
        .map-selector-btn {
            padding: 0.5rem 1.5rem; font-size: 0.8rem; background: transparent; color: #888;
            border: 1px solid #333; border-radius: 20px; cursor: pointer; transition: all 0.3s;
        }
        .map-selector-btn.active, .map-selector-btn:hover { color: #000; background: var(--accent-color); border-color: var(--accent-color); }
        .map-viewer { flex: 1; overflow: hidden; cursor: grab; background: #080808; position: relative; border-radius: 0 0 12px 12px; touch-action: none; }
        .map-viewer.is-dragging { cursor: grabbing; }
        .map-canvas { position: absolute; transform-origin: 0 0; will-change: transform; }
        .map-canvas img { display: block; max-width: none; pointer-events: none; }
        .map-controls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 5px; }
        .map-control-btn { width: 40px; height: 40px; background: rgba(20,20,20,0.9); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 50%; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .map-control-btn:hover { color: var(--accent-color); border-color: var(--accent-color); }

        /* --- AUTH MODAL --- */
        .auth-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 6000;
            display: none; justify-content: center; align-items: center;
        }
        .auth-modal.active { display: flex; }
        .auth-form {
            background: #111; border: 1px solid var(--accent-color); border-radius: 12px;
            padding: 2.5rem; width: 90%; max-width: 400px;
        }
        .auth-form h2 { font-family: var(--font-header); color: var(--accent-color); margin-bottom: 1.5rem; text-align: center; }
        .auth-form input {

    <script>
        // =========================================================
        // SUPABASE INIT — Replace with YOUR keys
        // =========================================================
        const SUPABASE_URL = 'https://gdivyqfhgashkqcqqnas.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_pumorCjNkGt1RV_Ygfq30A_IFtVz_Lt';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // =========================================================
        // PARTICLES
        // =========================================================
        const Particles = {
            init: () => {
                const canvas = document.getElementById('particle-canvas');
                const ctx = canvas.getContext('2d');
                let width, height, particlesArray = [];
                const resize = () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; };
                window.addEventListener('resize', resize); resize();
                class Particle {
                    constructor() { this.x = Math.random() * width; this.y = Math.random() * height; this.size = Math.random() * 1.5 + 0.5; this.speedY = Math.random() * 0.3 + 0.1; this.opacity = Math.random() * 0.5; }
                    update() { this.y -= this.speedY; if(this.y < 0) { this.y = height; this.x = Math.random() * width; } }
                    draw() { ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
                }
                for(let i=0; i<30; i++) particlesArray.push(new Particle());
                (function animate() { ctx.clearRect(0,0,width,height); particlesArray.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); })();
            }
        };

        // =========================================================
        // VISUALS
        // =========================================================
        const Visuals = {
            initDynamicTransparency: () => {
                const app = document.getElementById('app-container');
                const bgLayer = document.getElementById('global-bg');
                let ticking = false;
                if(window.innerWidth < 900) return;
                window.addEventListener('mousemove', (e) => {
                    if (!ticking) {
                        window.requestAnimationFrame(() => {
                            const w = window.innerWidth, h = window.innerHeight;
                            const isBottomRight = (e.clientX > w * 0.90) && (e.clientY > h * 0.90);
                            if (isBottomRight) { app.style.opacity = '0'; bgLayer.style.filter = 'blur(0px) brightness(1)'; }
                            else {
                                app.style.opacity = '1';
                                const isHovering = e.target.closest('.glass-box') || e.target.closest('.char-card');
                                if (isHovering) { bgLayer.style.filter = 'blur(5px) brightness(0.5)'; }
                                else {
                                    const distX = Math.abs(e.clientX - w/2), distY = Math.abs(e.clientY - h/2);
                                    const blur = 5 * (1 - (Math.hypot(distX, distY) / Math.hypot(w/2, h/2)));
                                    bgLayer.style.filter = `blur(${blur}px) brightness(${0.5 + (0.5 * (Math.hypot(distX, distY) / Math.hypot(w/2, h/2)))})`;
                                }
                            }
                            ticking = false;
                        }); ticking = true;
                    }
                });
            },
            initCardTilt: () => {
                if(window.innerWidth < 900) return;
                document.querySelectorAll('.char-card').forEach(card => {
                    card.addEventListener('mousemove', (e) => {
                        requestAnimationFrame(() => {
                            const rect = card.getBoundingClientRect();
                            const x = e.clientX - rect.left - rect.width/2, y = e.clientY - rect.top - rect.height/2;
                            card.classList.remove('reset-anim');
                            card.style.transform = `perspective(1000px) scale(1.02) rotateX(${y * -0.05}deg) rotateY(${x * 0.05}deg)`;
                        });
                    });
                    card.addEventListener('mouseleave', () => { card.classList.add('reset-anim'); card.style.transform = `perspective(1000px) scale(1) rotateX(0deg) rotateY(0deg)`; });
                });
            },
            openLightbox: (src) => {
                const lb = document.getElementById('lightbox'); document.getElementById('lightbox-img').src = src;
                lb.style.display = 'flex'; setTimeout(() => lb.classList.add('active'), 10);
            }
        };

        // =========================================================
        // AUDIO
        // =========================================================
        const AudioController = {
            audioEl: null, btn: null, started: false,
            init: () => {
                AudioController.audioEl = document.getElementById('ambient-audio');
                document.getElementById('audio-toggle-container').innerHTML = `<div class="back-btn-wrapper" id="audio-btn"><i class="fas fa-volume-mute"></i></div>`;
                AudioController.btn = document.getElementById('audio-btn');
                AudioController.btn.addEventListener('click', AudioController.toggle);
            },
            toggle: () => {
                if(!AudioController.audioEl) return;
                AudioController.audioEl.muted = !AudioController.audioEl.muted;
                if(!AudioController.started && !AudioController.audioEl.muted) { AudioController.audioEl.play().catch(()=>{}); AudioController.started=true; }
                AudioController.btn.innerHTML = `<i class="fas fa-volume-${AudioController.audioEl.muted ? 'mute' : 'up'}"></i>`;
            }
        };

        // =========================================================
        // READER FEATURES
        // =========================================================
        const ReaderFeatures = {
            fontSize: 'text-md', fontFamily: 'font-serif',
            toggleFocus: (btn) => { document.body.classList.toggle('focus-active'); btn.classList.toggle('active'); },
            toggleFontMenu: () => { const m = document.getElementById('font-menu'); m.style.display = m.style.display==='flex'?'none':'flex'; },
            setFontSize: (s) => { ReaderFeatures.fontSize = s; ReaderFeatures.applyFonts(); },
            setFontFamily: (f) => { ReaderFeatures.fontFamily = f; ReaderFeatures.applyFonts(); },
            applyFonts: () => { const c = document.querySelector('.reader-content'); if(c) c.className = `reader-content glass-box ${ReaderFeatures.fontSize} ${ReaderFeatures.fontFamily}`; },
            toggleSidebar: () => {
                const sb = document.querySelector('.reader-sidebar'), bd = document.querySelector('.sidebar-backdrop');
                if(sb) sb.classList.toggle('active'); if(bd) bd.classList.toggle('active');
            }
        };

        // =========================================================
        // MAP VIEWER ENGINE
        // =========================================================
        const MapViewer = {
            viewer: null, canvas: null, img: null,
            state: { scale: 1, x: 0, y: 0, isDragging: false, startX: 0, startY: 0, lastDist: 0 },
            init: (src) => {
                MapViewer.viewer = document.getElementById('map-viewer');
                MapViewer.canvas = document.getElementById('map-canvas');
                MapViewer.img = document.getElementById('map-image');
                MapViewer.state = { scale: 1, x: 0, y: 0, isDragging: false, startX: 0, startY: 0, lastDist: 0 };
                MapViewer.img.onload = () => MapViewer.centerMap();
                MapViewer.img.src = src;
                const v = MapViewer.viewer;
                v.addEventListener('mousedown', MapViewer.onDown);
                window.addEventListener('mousemove', MapViewer.onMove);
                window.addEventListener('mouseup', MapViewer.onUp);
                v.addEventListener('wheel', MapViewer.onWheel, {passive: false});
                v.addEventListener('touchstart', MapViewer.onTouchStart, {passive: false});
                v.addEventListener('touchmove', MapViewer.onTouchMove, {passive: false});
                v.addEventListener('touchend', MapViewer.onUp);
                document.getElementById('zoom-in-btn').onclick = () => MapViewer.zoom(1.2);
                document.getElementById('zoom-out-btn').onclick = () => MapViewer.zoom(0.8);
            },
            centerMap: () => {
                if(!MapViewer.img || !MapViewer.viewer) return;
                const vw = MapViewer.viewer.clientWidth, vh = MapViewer.viewer.clientHeight;
                const iw = MapViewer.img.naturalWidth, ih = MapViewer.img.naturalHeight;
                const scale = Math.min(vw/iw, vh/ih, 1);
                MapViewer.state.scale = scale;
                MapViewer.state.x = (vw - iw*scale)/2; MapViewer.state.y = (vh - ih*scale)/2;
                MapViewer.update();
            },
            update: () => { const {x,y,scale} = MapViewer.state; MapViewer.canvas.style.transform = `translate(${x}px, ${y}px) scale(${scale})`; },
            clamp: () => {
                const vw = MapViewer.viewer.clientWidth, vh = MapViewer.viewer.clientHeight;
                const w = MapViewer.img.naturalWidth * MapViewer.state.scale, h = MapViewer.img.naturalHeight * MapViewer.state.scale;
                if(w<=vw) MapViewer.state.x=(vw-w)/2; else MapViewer.state.x=Math.min(0,Math.max(MapViewer.state.x,vw-w));
                if(h<=vh) MapViewer.state.y=(vh-h)/2; else MapViewer.state.y=Math.min(0,Math.max(MapViewer.state.y,vh-h));
            },
            zoom: (factor) => {
                const old = MapViewer.state.scale, nw = Math.max(0.1,Math.min(old*factor,5));
                const vw=MapViewer.viewer.clientWidth,vh=MapViewer.viewer.clientHeight,cx=vw/2,cy=vh/2;
                MapViewer.state.x=cx-(cx-MapViewer.state.x)*(nw/old); MapViewer.state.y=cy-(cy-MapViewer.state.y)*(nw/old);
                MapViewer.state.scale=nw; MapViewer.clamp(); MapViewer.update();
            },
            onWheel: (e) => { e.preventDefault(); MapViewer.zoom(e.deltaY<0?1.1:0.9); },
            onDown: (e) => { e.preventDefault(); MapViewer.startDrag(e.clientX,e.clientY); },
            onTouchStart: (e) => {
                e.preventDefault();
                if(e.touches.length===2) { MapViewer.state.isDragging=false; MapViewer.state.lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }
                else MapViewer.startDrag(e.touches[0].clientX,e.touches[0].clientY);
            },
            startDrag: (x,y) => { MapViewer.state.isDragging=true; MapViewer.state.startX=x-MapViewer.state.x; MapViewer.state.startY=y-MapViewer.state.y; MapViewer.viewer.classList.add('is-dragging'); },
            onMove: (e) => { if(MapViewer.state.isDragging){e.preventDefault();MapViewer.doDrag(e.clientX,e.clientY);} },
            onTouchMove: (e) => {
                e.preventDefault();
                if(e.touches.length===2){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); if(MapViewer.state.lastDist>0){MapViewer.zoom(d/MapViewer.state.lastDist);MapViewer.state.lastDist=d;} }
                else if(MapViewer.state.isDragging) MapViewer.doDrag(e.touches[0].clientX,e.touches[0].clientY);
            },
            doDrag: (x,y) => { MapViewer.state.x=x-MapViewer.state.startX; MapViewer.state.y=y-MapViewer.state.startY; MapViewer.clamp(); MapViewer.update(); },
            onUp: () => { MapViewer.state.isDragging=false; MapViewer.viewer.classList.remove('is-dragging'); }
        };

        // =========================================================
        // AUTH SYSTEM
        // =========================================================
        const Auth = {
            user: null,
            isAdmin: false,

            init: async () => {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    Auth.user = session.user;
                    await Auth.checkAdmin();
                }
                supabase.auth.onAuthStateChange(async (event, session) => {
                    Auth.user = session?.user || null;
                    if (Auth.user) await Auth.checkAdmin();
                    else Auth.isAdmin = false;
                    Auth.updateUI();
                });
                Auth.updateUI();
            },

            checkAdmin: async () => {
                const { data } = await supabase.from('profiles').select('role').eq('id', Auth.user.id).single();
                Auth.isAdmin = data?.role === 'admin';
            },

            updateUI: () => {
                const container = document.getElementById('admin-toggle-container');
                if (Auth.isAdmin) {
                    container.innerHTML = `
                        <div class="back-btn-wrapper" style="color:var(--accent-color)" onclick="Router.navigate('admin')"><i class="fas fa-cog"></i></div>
                        <div class="back-btn-wrapper" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i></div>`;
                } else if (Auth.user) {
                    container.innerHTML = `<div class="back-btn-wrapper" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i></div>`;
                } else {
                    container.innerHTML = `<div class="back-btn-wrapper" onclick="Auth.showModal()"><i class="fas fa-lock"></i></div>`;
                }
            },

            showModal: () => {
                document.getElementById('auth-error').textContent = '';
                document.getElementById('auth-email').value = '';
                document.getElementById('auth-password').value = '';
                document.getElementById('auth-modal').classList.add('active');
            },
            closeModal: () => document.getElementById('auth-modal').classList.remove('active'),

            login: async () => {
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;
                const errEl = document.getElementById('auth-error');
                errEl.textContent = '';
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) { errEl.textContent = error.message; return; }
                Auth.closeModal();
                Router.navigate('home');
            },

            logout: async () => {
                await supabase.auth.signOut();
                Auth.user = null;
                Auth.isAdmin = false;
                Auth.updateUI();
                Router.navigate('home');
            }
        };

        // =========================================================
        // STATE & DATA LAYER (SUPABASE QUERIES)
        // =========================================================
        const State = {
            stories: [],
            currentStory: null,
            currentChars: [],
            currentWallpapers: [],
            filterTag: 'All',
        };

        const DB = {
            getStories: async () => {
                try {
                    let query = supabase.from('stories').select('*').order('sort_order');
                    if (!Auth.isAdmin) query = query.eq('is_published', true);
                    const { data, error } = await query;
                    if (error) throw error;
                    return data || [];
                } catch (e) {
                    console.error("Stories error:", e);
                    return [];
                }
            },
            getStory: async (slug) => {
                try {
                    let query = supabase.from('stories').select('*').eq('slug', slug).single();
                    const { data, error } = await query;
                    if (error) throw error;
                    return data;
                } catch (e) {
                    console.error("Story error:", e);
                    return null;
                }
            },
            getChapters: async (storyId) => {
                try {
                    let query = supabase.from('chapters').select('*').eq('story_id', storyId).order('chapter_order');
                    if (!Auth.isAdmin) query = query.eq('is_published', true);
                    const { data, error } = await query;
                    if (error) throw error;
                    return data || [];
                } catch (e) {
                    console.error("Chapters error:", e);
                    return [];
                }
            },
            getCharacters: async (storyId) => {
                try {
                    const { data, error } = await supabase.from('characters').select('*').eq('story_id', storyId).order('sort_order');
                    if (error) throw error;
                    return data || [];
                } catch (e) { console.error(e); return []; }
            },
            getGalleryImages: async (characterId) => {
                try {
                    const { data, error } = await supabase.from('character_gallery_images').select('*').eq('character_id', characterId).order('sort_order');
                    if (error) throw error;
                    return data || [];
                } catch (e) { console.error(e); return []; }
            },
            getWallpapers: async (storyId) => {
                try {
                    const { data, error } = await supabase.from('story_wallpapers').select('*').eq('story_id', storyId).order('sort_order');
                    if (error) throw error;
                    return data || [];
                } catch (e) { console.error(e); return []; }
            },
            getLore: async (storyId) => {
                try {
                    const { data, error } = await supabase.from('lore_entries').select('*, lore_categories(name)').eq('story_id', storyId).order('sort_order');
                    if (error) throw error;
                    return data || [];
                } catch (e) { console.error(e); return []; }
            },
            getTimeline: async (storyId) => {
                try {
                    const { data, error } = await supabase.from('timeline_events').select('*, timeline_event_characters(character_id, characters(id, name, profile_image_url, role_title))').eq('story_id', storyId).order('event_order');
                    if (error) throw error;
                    return data || [];
                } catch (e) { console.error(e); return []; }
            },
            getMaps: async (storyId) => {
                try {
                    const { data, error } = await supabase.from('maps').select('*').eq('story_id', storyId).order('sort_order');
                    if (error) throw error;
                    return data || [];
                } catch (e) { console.error(e); return []; }
            },
            getAuthor: async () => {
                try {
                    const { data: profile, error } = await supabase.from('profiles')
                        .select('*, author_links(*)')
                        .eq('role', 'admin')
                        .order('sort_order', { foreignTable: 'author_links' })
                        .limit(1)
                        .single();
                    if (error && error.code !== 'PGRST116') throw error;
                    return profile || null;
                } catch (e) {
                    console.error("Author fetch error:", e);
                    return null;
                }
            },
            getSetting: async (key) => {
                try {
                    const { data, error } = await supabase.from('site_settings').select('setting_value').eq('setting_key', key).single();
                    if (error && error.code !== 'PGRST116') throw error;
                    return data?.setting_value || null;
                } catch (e) {
                    console.error("Setting error:", e);
                    return null;
                }
            },

// =========================================================

        // =========================================================

        // =========================================================
        const AdminViews = {
            stories: async () => {
                // For admin, fetch ALL stories (bypass is_published filter)
                const { data: stories } = await supabase.from('stories').select('*').order('sort_order');
                let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                    <h3 style="font-family:var(--font-header);color:#fff;">Stories</h3>

                html += `<table class="admin-table"><thead><tr><th>Cover</th><th>Title</th><th>Slug</th><th>Status</th><th>Published</th><th>Actions</th></tr></thead><tbody>`;
                (stories || []).forEach(s => {
                    html += `<tr>
                        <td><img src="${s.cover_image_url || ''}" onerror="this.style.display='none'"></td>
                        <td>${s.title}</td>
                        <td style="color:#888;font-size:0.8rem;">${s.slug}</td>

                            <button class="admin-action-btn" onclick="AdminForms.storyForm('${s.id}')"><i class="fas fa-edit"></i></button>
                            <button class="admin-action-btn delete" onclick="AdminActions.deleteItem('stories','${s.id}')"><i class="fas fa-trash"></i></button>

            chapters: async () => {
                const { data: stories } = await supabase.from('stories').select('id, title, slug').order('sort_order');
                if(!stories || !stories.length) return '<p style="color:#888">Create a story first.</p>';

                // Store for use

                        <button class="btn-large btn-success" onclick="AdminActions.saveLore('${storyId}','${editId || ''}')"><i class="fas fa-save"></i> Save</button>
                        <button class="btn-large" style="border-color:#555" onclick="AdminForms.close()">Cancel</button>
                    </div>`);
            },

            timelineForm: async (storyId, editId = null) => {
                let evt = { event_date:'', title:'', description:'', event_order:0 };
                if(editId) { const { data } = await supabase.from('timeline_events').select('*').eq('id', editId).single(); if(data) evt = data; }
                else {
                    const { data: last } = await supabase.from('timeline_events').select('event_order').eq('story_id', storyId).order('event_order', {ascending:false}).limit(1);
                    evt.event_order = last && last.length > 0 ? last[0].event_order + 1 : 0;
                }
                AdminForms.show(`
                    <h3>${editId ? 'Edit' : 'Add'} Timeline Event</h3>
                    <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:1rem;">
                        <div class="form-group"><label>Date Label</label><input id="tf-date" value="${evt.event_date}"></div>
                        <div class="form-group"><label>Title</label><input id="tf-title" value="${evt.title}"></div>
                        <div class="form-group"><label>Order</label><input type="number" id="tf-order" value="${evt.event_order}" style="width:80px;"></div>
                    </div>
                    <div class="form-group"><label>Description</label><textarea id="tf-desc">${evt.description}</textarea></div>
                    <div class="form-actions">
                        <button class="btn-large btn-success" onclick="AdminActions.saveTimeline('${storyId}','${editId || ''}')"><i class="fas fa-save"></i> Save</button>
                        <button class="btn-large" style="border-color:#555" onclick="AdminForms.close()">Cancel</button>
                    </div>`);
            },

            mapForm: async (storyId, editId = null) => {
                let m = { map_name:'', image_url:'', is_primary:false, sort_order:0 };
                if(editId) { const { data } = await supabase.from('maps').select('*').eq('id', editId).single(); if(data) m = data; }
                AdminForms.show(`
                    <h3>${editId ? 'Edit' : 'Add'} Map</h3>
                    <div class="form-group"><label>Map Name</label><input id="mf-name" value="${m.map_name}"></div>
                    <div class="form-group"><label>Image URL</label><input id="mf-url" value="${m.image_url}"></div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                        <div class="form-group"><label>Sort Order</label><input type="number" id="mf-order" value="${m.sort_order || 0}"></div>
                        <div class="form-group"><label>Primary?</label><div class="checkbox-row"><input type="checkbox" id="mf-primary" ${m.is_primary ? 'checked' : ''}></div></div>
                    </div>
                    <div class="form-actions">
                        <button class="btn-large btn-success" onclick="AdminActions.saveMap('${storyId}','${editId || ''}')"><i class="fas fa-save"></i> Save</button>
                        <button class="btn-large" style="border-color:#555" onclick="AdminForms.close()">Cancel</button>
                    </div>`);
            },

            wallpaperForm: async (storyId) => {
                AdminForms.show(`
                    <h3>Add Wallpaper</h3>
                    <div class="form-group"><label>Image URL</label><input id="wf-url" placeholder="https://..."></div>
                    <div class="form-group"><label>Label</label><input id="wf-label" placeholder="e.g. Night Scene"></div>
                    <div class="form-actions">
                        <button class="btn-large btn-success" onclick="AdminActions.saveWallpaper('${storyId}')"><i class="fas fa-save"></i> Save</button>
                        <button class="btn-large" style="border-color:#555" onclick="AdminForms.close()">Cancel</button>
                    </div>`);
            },

            linkForm: async (profileId, editId = null) => {
                let l = { platform_name:'', url:'', icon_url:'', note:'', sort_order:0 };
                if(editId) { const { data } = await supabase.from('author_links').select('*').eq('id', editId).single(); if(data) l = data; }
                AdminForms.show(`
                    <h3>${editId ? 'Edit' : 'Add'} Social Link</h3>
                    <div class="form-group"><label>Platform Name</label><input id="lkf-name" value="${l.platform_name}"></div>
                    <div class="form-group"><label>URL</label><input id="lkf-url" value="${l.url}"></div>
                    <div class="form-group"><label>Icon URL</label><input id="lkf-icon" value="${l.icon_url || ''}"></div>
                    <div class="form-group"><label>Note</label><input id="lkf-note" value="${l.note || ''}"></div>
                    <div class="form-group"><label>Sort Order</label><input type="number" id="lkf-order" value="${l.sort_order || 0}" style="width:100px;"></div>
                    <div class="form-actions">
                        <button class="btn-large btn-success" onclick="AdminActions.saveLink('${profileId}','${editId || ''}')"><i class="fas fa-save"></i> Save</button>
                        <button class="btn-large" style="border-color:#555" onclick="AdminForms.close()">Cancel</button>
                    </div>`);
            },
        };

        // =========================================================
        // ADMIN ACTIONS (DATABASE WRITES)
        // =========================================================
        const AdminActions = {
            deleteItem: async (table, id, refreshTab) => {
                if(!confirm('Delete this item?')) return;
                await supabase.from(table).delete().eq('id', id);
                if(refreshTab) Render.admin(refreshTab);
                else Render.admin('stories');
            },

            saveStory: async (editId) => {
                const payload = {
                    title: document.getElementById('sf-title').value,
                    slug: document.getElementById('sf-slug').value,
                    short_description: document.getElementById('sf-desc').value,
                    synopsis: document.getElementById('sf-synopsis').value,
                    genre: document.getElementById('sf-genre').value,
                    status: document.getElementById('sf-status').value,
                    cover_image_url: document.getElementById('sf-cover').value,
                    background_image_url: document.getElementById('sf-bg').value,
                    theme_color: document.getElementById('sf-color').value,
                    sort_order: parseInt(document.getElementById('sf-order').value) || 0,
                    is_published: document.getElementById('sf-pub').checked,
                    world_title: document.getElementById('sf-world').value,
                };
                if(editId) await supabase.from('stories').update(payload).eq('id', editId);
                else await supabase.from('stories').insert(payload);
                AdminForms.close(); Render.admin('stories');
            },

            saveChapter: async (storyId, editId) => {
                const content = document.getElementById('cf-content').value;
                const payload = {
                    story_id: storyId,
                    title: document.getElementById('cf-title').value,
                    content: content,
                    chapter_order: parseInt(document.getElementById('cf-order').value) || 0,
                    word_count: content.split(/\s+/).filter(w=>w).length,
                    is_published: document.getElementById('cf-pub').checked,
                };
                if(editId) await supabase.from('chapters').update(payload).eq('id', editId);
                else await supabase.from('chapters').insert(payload);
                AdminForms.close(); Render.admin('chapters');
            },

            saveCharacter: async (storyId, editId) => {
                const payload = {
                    story_id: storyId,
                    name: document.getElementById('chf-name').value,
                    role_title: document.getElementById('chf-role').value,
                    biography: document.getElementById('chf-bio').value,
                    profile_image_url: document.getElementById('chf-img').value,
                    sort_order: parseInt(document.getElementById('chf-order').value) || 0,
                };
                if(editId) await supabase.from('characters').update(payload).eq('id', editId);
                else await supabase.from('characters').insert(payload);
                AdminForms.close(); Render.admin('characters');
            },

            addGalleryImage: async (charId, charName) => {
                const url = document.getElementById('gi-url').value;
                const tags = document.getElementById('gi-tags').value.split(',').map(t => t.trim()).filter(t => t);
                if(!url) return;
                await supabase.from('character_gallery_images').insert({ character_id: charId, image_url: url, image_tags: tags });
                AdminForms.galleryManager(charId, charName);
            },

            deleteGalleryImage: async (imgId, charId, charName) => {
                if(!confirm('Delete this image?')) return;
                await supabase.from('character_gallery_images').delete().eq('id', imgId);
                AdminForms.galleryManager(charId, charName);
            },

            saveLore: async (storyId, editId) => {
                let categoryId = document.getElementById('lf-cat').value || null;
                const newCat = document.getElementById('lf-newcat').value.trim();
                if(newCat) {
                    const catSlug = newCat.toLowerCase().replace(/\s+/g, '-');
                    const { data: catData } = await supabase.from('lore_categories').upsert({ story_id: storyId, name: newCat, slug: catSlug }, { onConflict: 'story_id, slug' }).select().single();
                    if(catData) categoryId = catData.id;
                }
                const payload = {
                    story_id: storyId,
                    slug: document.getElementById('lf-slug').value,
                    title: document.getElementById('lf-title').value,
                    category_id: categoryId,
                    description: document.getElementById('lf-desc').value,
                    image_url: document.getElementById('lf-img').value,
                };
                if(editId) await supabase.from('lore_entries').update(payload).eq('id', editId);
                else await supabase.from('lore_entries').insert(payload);
                AdminForms.close(); Render.admin('lore');
            },

            saveTimeline: async (storyId, editId) => {
                const payload = {
                    story_id: storyId,
                    event_date: document.getElementById('tf-date').value,
                    title: document.getElementById('tf-title').value,
                    description: document.getElementById('tf-desc').value,
                    event_order: parseInt(document.getElementById('tf-order').value) || 0,
                };
                if(editId) await supabase.from('timeline_events').update(payload).eq('id', editId);
                else await supabase.from('timeline_events').insert(payload);
                AdminForms.close(); Render.admin('timeline');
            },

            saveMap: async (storyId, editId) => {
                const payload = {
                    story_id: storyId,
                    map_name: document.getElementById('mf-name').value,
                    image_url: document.getElementById('mf-url').value,
                    sort_order: parseInt(document.getElementById('mf-order').value) || 0,
                    is_primary: document.getElementById('mf-primary').checked,
                };
                if(editId) await supabase.from('maps').update(payload).eq('id', editId);
                else await supabase.from('maps').insert(payload);
                AdminForms.close(); Render.admin('maps');
            },

            saveWallpaper: async (storyId) => {
                const url = document.getElementById('wf-url').value;
                if(!url) return;
                await supabase.from('story_wallpapers').insert({ story_id: storyId, image_url: url, label: document.getElementById('wf-label').value });
                AdminForms.close(); Render.admin('wallpapers');
            },

            saveProfile: async (profileId) => {
                await supabase.from('profiles').update({
                    display_name: document.getElementById('pf-name').value,
                    bio: document.getElementById('pf-bio').value,
                    avatar_url: document.getElementById('pf-avatar').value,
                }).eq('id', profileId);
                alert('Profile saved!');
                Render.admin('profile');
            },

            saveLink: async (profileId, editId) => {
                const payload = {
                    profile_id: profileId,
                    platform_name: document.getElementById('lkf-name').value,
                    url: document.getElementById('lkf-url').value,
                    icon_url: document.getElementById('lkf-icon').value,
                    note: document.getElementById('lkf-note').value,
                    sort_order: parseInt(document.getElementById('lkf-order').value) || 0,
                };
                if(editId) await supabase.from('author_links').update(payload).eq('id', editId);
                else await supabase.from('author_links').insert(payload);
                AdminForms.close(); Render.admin('profile');
            },
        };

        // =========================================================
        // ROUTER
        // =========================================================
        const Router = {
            getParts: () => (window.location.hash.slice(1) || 'home').split('/'),
            navigate: (h) => {
                document.body.classList.add('is-transitioning');
                setTimeout(() => window.location.hash = h, 400);
            },
            handle: () => {
                document.getElementById('lightbox').classList.remove('active');
                setTimeout(() => document.getElementById('lightbox').style.display = 'none', 300);
                document.getElementById('wp-modal').style.display = 'none';
                document.getElementById('admin-form-modal').classList.remove('active');
                const sb = document.querySelector('.reader-sidebar'); if(sb) sb.classList.remove('active');
                const bd = document.querySelector('.sidebar-backdrop'); if(bd) bd.classList.remove('active');
                document.body.classList.remove('focus-active');

                const parts = Router.getParts();
                const view = parts[0], id = parts[1], subId = parts[2];

                (async () => {
                    switch(view) {
                        case 'story': await Render.storyHub(id); break;
                        case 'read': await Render.reader(id, subId || 0); break;
                        case 'gallery': await Render.gallery(id, subId); break;
                        case 'lore':
                            if(subId) await Render.loreDetail(id, subId);
                            else await Render.lore(id);
                            break;
                        case 'timeline': await Render.timeline(id); break;
                        case 'maps': await Render.maps(id); break;
                        case 'admin': await Render.admin(id || 'stories'); break;
                        default: await Render.home(); break;
                    }
                })().then(() => {
                    setTimeout(() => {
                        document.body.classList.remove('is-transitioning');
                        document.getElementById('content-stage').scrollTop = 0;
                    }, 100);
                });
            }
        };

        // =========================================================
        // BOOT
        // =========================================================
        window.addEventListener('hashchange', Router.handle);
        window.addEventListener('DOMContentLoaded', async () => {
            await Auth.init();
            Router.handle();
            Visuals.initDynamicTransparency();
            Particles.init();
            AudioController.init();
        });
    </script>
</body>
</html>
