    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">

    <style>
        /* --- CORE VARIABLES --- */
        :root {
            --primary-color: #ffffff;
            --accent-color: #ffd700;
            --success-color: #4caf50;
            --danger-color: #ff6b6b;
            --glass-bg: rgba(15, 15, 15, 0.70); 
            --glass-border: rgba(255, 255, 255, 0.12);
            --font-header: 'Cinzel', serif;
            --font-body: 'Lora', serif;
            --font-ui: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: var(--font-ui);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }



        /* --- BACKGROUND --- */
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .background-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background-color: #111;
            background-size: cover; background-position: center;
            transition: filter 0.6s ease;
        }
        
        #app-container { 
            position: relative; width: 100%; height: 100%; z-index: 10;
            display: flex; flex-direction: column; padding: 1.5rem 2rem;
            transition: opacity 0.1s linear, padding-right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* --- UI UTILITIES --- */
        /* FIX 9: Reduced blur from 20px to 10px — halves GPU compositing work */
        .glass-box {
            background: var(--glass-bg);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: background 0.3s, border-color 0.3s;
        }
        .glass-box:hover {
            background: rgba(20, 20, 20, 0.8);
            border-color: rgba(255, 255, 255, 0.25);
        }

        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000;
            display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease;
            pointer-events: none;
        }
        #lightbox.active {
            opacity: 1;
            pointer-events: all;
        }
        #lightbox-img {
            max-width: 95%; max-height: 95vh;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 1px solid #333;
            transform: scale(0.95); transition: transform 0.3s ease;
        }
        #lightbox.active #lightbox-img { transform: scale(1); }

        /* --- HEADER --- */
        #main-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.8rem 2rem; margin-bottom: 0.5rem; flex-shrink: 0; z-index: 20;
            height: 70px;
            transition: opacity 0.3s;
        }
        .logo { 
            font-family: var(--font-header); font-size: 1.6rem; letter-spacing: 4px; 
            color: var(--primary-color); text-shadow: 0 0 10px rgba(255,255,255,0.2); cursor: pointer;
        }
        .back-btn-wrapper {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            font-family: var(--font-ui); text-transform: uppercase; letter-spacing: 2px;
            font-size: 0.75rem; color: #a0a0a0; transition: color 0.3s;
        }
        .back-btn-wrapper:hover { color: var(--accent-color); }
        .header-controls { display: flex; align-items: center; gap: 1rem; }

        /* --- STAGE --- */
        #content-stage {
            flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px;
            display: flex; flex-direction: column;
            scrollbar-width: thin; scrollbar-color: var(--accent-color) rgba(0,0,0,0.3);
        }
        #content-stage::-webkit-scrollbar { width: 6px; }
        #content-stage::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        #content-stage::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }

        /* --- BUTTONS --- */
        .btn-large {
            padding: 0.8rem 2rem; font-family: var(--font-header); font-size: 0.9rem; letter-spacing: 2px;
            background: transparent; border: 1px solid var(--accent-color);
            color: var(--primary-color); cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 0.8rem; text-decoration: none;
            justify-content: center;
        }
        .btn-large:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 15px var(--accent-color); }

        /* --- LOADING SPINNER --- */
        .loading-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; gap: 1rem;
        }
        .spinner {
            width: 50px; height: 50px; border: 3px solid rgba(255,215,0,0.2);
            border-top-color: var(--accent-color); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- VIEW: HOME --- */
        .story-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
            padding: 2rem 0;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            perspective: 1000px;
        }

        .story-card {
            position: relative;
            height: 450px;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            background: #000;
        }

        .story-card img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease, filter 0.5s ease;
            opacity: 0.8;
        }

        .card-info {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 2rem;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 40%, transparent 100%);
            transform: translateY(20px);
            transition: transform 0.5s ease;
            z-index: 2;
        }

        .card-title {
            font-family: var(--font-header);
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            transition: color 0.3s;
            line-height: 1.1;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #ccc;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease 0.1s;
            max-height: 0;
        }

        .story-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(255, 215, 0, 0.2);
            border-color: var(--accent-color);
        }

        .story-card:hover img {
            transform: scale(1.15);
            filter: brightness(1.1);
            opacity: 1;
        }

        .story-card:hover .card-info { transform: translateY(0); }
        .story-card:hover .card-title { color: var(--accent-color); }
        .story-card:hover .card-desc { opacity: 1; transform: translateY(0); max-height: 100px; }

        /* --- AUTHOR SECTION --- */
        .author-section {
            max-width: 1000px;
            margin: 4rem auto 2rem auto;
            padding: 2.5rem;
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 3rem;
            align-items: start;
        }

        .author-img-wrapper {
            width: 180px; height: 180px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            padding: 5px;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.15);
            margin: 0 auto;
        }
        .author-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: #111;
        }

        .author-info h2 {
            font-family: var(--font-header);
            color: var(--accent-color);
            margin-bottom: 1rem;
            font-size: 2rem;
            line-height: 1;
        }
        .author-bio {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }

        .author-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .link-row {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem;
            text-decoration: none;
            transition: transform 0.2s, background 0.2s;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }
        .link-row:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(10px);
            border-color: var(--accent-color);
        }

        .social-icon {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .link-details { display: flex; flex-direction: column; }
        .link-name { font-family: var(--font-header); color: #fff; font-size: 1.1rem; }
        .link-note { font-size: 0.85rem; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        /* --- VIEW: STORY HUB --- */
        .story-hub-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 2rem; gap: 1.5rem; }
        .story-hub-layout {
            display: grid; grid-template-columns: 220px 1fr; gap: 2.5rem;
            width: 100%; max-width: 850px; padding: 2rem !important; align-items: center;
        }
        .hub-cover { width: 100%; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .hub-details { display: flex; flex-direction: column; justify-content: center; }
        .hub-details h1 { font-family: var(--font-header); font-size: 2.2rem; margin-bottom: 0.5rem; line-height: 1.1; color: #fff; }
        .hub-meta { color: var(--accent-color); margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; font-weight: 600; opacity: 0.9; }
        .hub-synopsis { 
            font-size: 1rem; line-height: 1.6; color: #ddd; margin-bottom: 2rem;
            max-height: 200px; overflow-y: auto; padding-right: 10px;
        }
        .hub-actions { display: flex; gap: 1rem; }
        .world-hub-bar { width: 100%; max-width: 850px; padding: 1rem 2rem; text-align: center; }
        .world-hub-bar .bar-title { font-family: var(--font-header); font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; color: #aaa; margin-bottom: 1rem; }
        .world-hub-bar .bar-actions { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
        .world-hub-bar .btn-large { font-size: 0.8rem; padding: 0.6rem 1.5rem; border-color: rgba(255,255,255,0.2); }

        /* --- VIEW: READER --- */
        .reader-layout { display: flex; gap: 2rem; height: 100%; max-width: 1300px; margin: 0 auto; width: 100%; position: relative; }
        .reader-sidebar { width: 220px; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.05); padding-right: 0.5rem; flex-shrink: 0; transition: width 0.3s, opacity 0.3s; }
        .chapter-list-item { padding: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-size: 0.85rem; transition: 0.2s; color: #888; }
        .chapter-list-item:hover { color: var(--accent-color); padding-left: 1rem; }
        .chapter-list-item.active { border-left: 3px solid var(--accent-color); color: #fff; background: rgba(255,215,0,0.05); }
        .reader-content { flex: 1; max-width: 800px; margin: 0 auto; padding: 3rem 4rem; color: #d0d0d0; overflow-y: auto; position: relative; transition: max-width 0.3s; user-select: text; }
        
        .reader-toolbar { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        .rt-btn { background: transparent; border: none; color: #666; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .rt-btn:hover, .rt-btn.active { color: var(--accent-color); }
        .font-menu { position: absolute; top: 60px; right: 20px; background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 6px; display: none; flex-direction: column; gap: 8px; z-index: 50; width: 120px; }
        .font-option { cursor: pointer; font-size: 0.8rem; color: #aaa; padding: 4px; border-radius: 4px; }
        .font-option:hover { background: #333; color: #fff; }
        
        body.focus-active #main-header { opacity: 0; pointer-events: none; }
        body.focus-active .reader-sidebar { width: 0; padding: 0; opacity: 0; overflow: hidden; }
        body.focus-active .reader-content { max-width: 900px; background: rgba(10, 10, 10, 0.9); }
        
        .text-sm { font-size: 1rem; } .text-md { font-size: 1.2rem; } .text-lg { font-size: 1.4rem; }
        .font-serif { font-family: var(--font-body); } .font-sans { font-family: var(--font-ui); }

        /* --- VIEW: GALLERY --- */
        .char-grid { display: flex; flex-wrap: wrap; gap: 2rem; justify-content: center; max-width: 1200px; margin: 0 auto; }
        .char-card {
            width: 220px; height: 350px; position: relative; border-radius: 10px;
            cursor: pointer; background: #000; border: 1px solid rgba(255,255,255,0.1);
            transform-style: preserve-3d; transition: transform 0.1s;
        }
        .char-card.reset-anim { transition: transform 0.5s ease; }
        .char-card-inner { width: 100%; height: 100%; position: relative; overflow: hidden; border-radius: 10px; transform: translateZ(20px); }
        .char-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .char-card:hover img { transform: scale(1.1); filter: brightness(0.6); }
        .char-info-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 80%, transparent 100%);
            padding: 1.2rem; transform: translateY(60%) translateZ(30px); transition: transform 0.3s ease;
        }
        .char-card:hover .char-info-overlay { transform: translateY(0) translateZ(30px); }
        .char-name { font-family: var(--font-header); font-size: 1.1rem; color: #fff; }
        .char-role { color: var(--accent-color); font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        .char-bio-preview { font-size: 0.75rem; line-height: 1.4; color: #ccc; opacity: 0; transition: opacity 0.3s 0.1s; margin-top: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .char-card:hover .char-bio-preview { opacity: 1; }

        .char-profile-hero { display: grid; grid-template-columns: 240px 1fr; gap: 2.5rem; padding: 2rem; max-width: 900px; margin: 0 auto 2rem auto; align-items: start; }
        .hero-img-container { width: 100%; aspect-ratio: 3 / 4; border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        .hero-name { font-family: var(--font-header); font-size: 2.5rem; line-height: 1; color: #fff; margin-bottom: 0.5rem; }
        .hero-role { font-family: var(--font-ui); text-transform: uppercase; letter-spacing: 2px; color: var(--accent-color); font-size: 0.8rem; margin-bottom: 1.5rem; opacity: 0.9; }
        .hero-bio { font-family: var(--font-body); font-size: 1rem; line-height: 1.6; color: #d0d0d0; white-space: pre-line; background: rgba(0,0,0,0.2); padding: 1.2rem; border-radius: 6px; max-height: 300px; overflow-y: auto; }
        
        .sub-gallery-grid { column-count: 3; column-gap: 1rem; max-width: 900px; margin: 0 auto; }
        .gallery-item { break-inside: avoid; margin-bottom: 1rem; border-radius: 6px; overflow: hidden; transition: transform 0.3s; cursor: zoom-in; border: 1px solid rgba(255,255,255,0.1); }
        .gallery-item:hover { transform: scale(1.02); border-color: var(--accent-color); }
        .gallery-item img { display: block; width: 100%; }

        /* --- VIEW: LORE --- */
        .lore-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; max-width: 1200px; width: 100%; margin: 1rem auto; }
        .lore-card { 
            display: flex; flex-direction: column; height: 350px; overflow: hidden; 
            cursor: pointer; position: relative; transition: transform 0.3s; 
        }
        .lore-card:hover { transform: translateY(-8px); border-color: var(--accent-color); }
        .lore-card-img { width: 100%; height: 60%; object-fit: cover; transition: transform 0.5s; }
        .lore-card:hover .lore-card-img { transform: scale(1.1); }
        .lore-card-content { padding: 1.2rem; flex: 1; display: flex; flex-direction: column; border-top: 1px solid rgba(255,255,255,0.05); }
        .lore-card-content .title { font-family: var(--font-header); font-size: 1.2rem; color: #fff; margin-bottom: 0.2rem; }
        .lore-card-content .type { font-size: 0.7rem; text-transform: uppercase; color: var(--accent-color); margin-bottom: 0.5rem; letter-spacing: 1px; }
        .lore-card-content .desc { font-size: 0.85rem; color: #bbb; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .lore-wiki-layout { max-width: 900px; margin: 0 auto; padding-bottom: 3rem; }
        .lore-wiki-header { position: relative; width: 100%; height: 300px; border-radius: 12px; overflow: hidden; margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.1); }
        .lore-wiki-header img { width: 100%; height: 100%; object-fit: cover; }
        .lore-wiki-body { padding: 3rem; }
        .lore-wiki-title { font-family: var(--font-header); font-size: 2.5rem; color: var(--accent-color); margin-bottom: 0.5rem; }
        .lore-wiki-type { font-family: var(--font-ui); text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
        .lore-wiki-text { font-family: var(--font-body); font-size: 1.1rem; line-height: 1.8; color: #d0d0d0; white-space: pre-line; user-select: text; }

        /* --- VIEW: TIMELINE --- */
        .timeline-wrapper { position: relative; max-width: 800px; margin: 2rem auto; padding: 2rem 0; }
        .timeline-path { position: absolute; left: 50%; top: 0; transform: translateX(-50%); width: 2px; height: 100%; background: linear-gradient(to bottom, transparent, var(--accent-color), transparent); opacity: 0.3; }
        .timeline-node { position: relative; width: 100%; margin-bottom: 4rem; display: flex; justify-content: center; }
        
        .timeline-content { width: 45%; padding: 1.5rem; position: relative; z-index: 2; }
        .node-left .timeline-content { margin-right: auto; text-align: right; border-right: 3px solid var(--accent-color); }
        .node-right .timeline-content { margin-left: auto; text-align: left; border-left: 3px solid var(--accent-color); }
        
        .timeline-dot { position: absolute; left: 50%; top: 1.5rem; width: 16px; height: 16px; background: #000; border: 2px solid var(--accent-color); border-radius: 50%; transform: translateX(-50%); z-index: 5; box-shadow: 0 0 10px var(--accent-color); }

        .timeline-content .date { font-weight: bold; color: var(--accent-color); margin-bottom: 0.5rem; font-family: var(--font-ui); letter-spacing: 1px; }
        .timeline-content .title { font-family: var(--font-header); font-size: 1.4rem; margin-bottom: 0.5rem; color: #fff; }
        .timeline-content .desc { font-size: 0.95rem; line-height: 1.6; color: #ccc; }

        .timeline-char-box {
            position: absolute; top: 0; width: 40%; 
            display: flex; align-items: center; gap: 10px; padding: 10px;
            cursor: pointer; opacity: 0.7; transition: all 0.3s;
            border: 1px solid transparent; border-radius: 8px;
        }
        .node-left .timeline-char-box { left: 55%; text-align: left; flex-direction: row; }
        .node-right .timeline-char-box { right: 55%; text-align: right; flex-direction: row-reverse; }
        
        .timeline-char-box:hover { opacity: 1; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); transform: scale(1.02); }
        .timeline-char-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--glass-border); }
        .timeline-char-info { display: flex; flex-direction: column; }
        .timeline-char-name { font-family: var(--font-header); font-size: 0.9rem; color: #fff; }
        .timeline-char-role { font-size: 0.7rem; color: var(--accent-color); text-transform: uppercase; }

        /* --- VIEW: MAPS --- */
        .map-layout { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .map-selector { flex-shrink: 0; padding: 0.5rem; text-align: center; background: rgba(0,0,0,0.3); display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; }
        .map-selector-btn {
            padding: 0.5rem 1.5rem; font-size: 0.8rem; background: transparent; color: #888;
            border: 1px solid #333; border-radius: 20px; cursor: pointer; transition: all 0.3s;
        }
        .map-selector-btn.active, .map-selector-btn:hover { color: #000; background: var(--accent-color); border-color: var(--accent-color); }
        
        .map-viewer { flex: 1; overflow: hidden; cursor: grab; background: #080808; position: relative; border-radius: 0 0 12px 12px; touch-action: none; }
        .map-viewer.is-dragging { cursor: grabbing; }

        .map-control-btn { width: 40px; height: 40px; background: rgba(20,20,20,0.9); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 50%; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }

/* --- NEW LORE LOADING SCREEN --- */
#lore-loading-screen {
    position: absolute;

    z-index: 50;

    overflow-y: auto;
}
#lore-loading-screen.active {
    opacity: 1;
    pointer-events: all;
}
.lore-loading-card {
    display: flex;
    flex-direction: column;
    max-width: 700px;
    width: 100%;
    margin-bottom: 2rem;
    overflow: hidden;
}
.ll-img-container {
    width: 100%;
    height: 300px;
    background: #000;
    border-bottom: 1px solid var(--glass-border);
}
.ll-img-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.85;
}
.ll-content {
    padding: 2.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}
#ll-title {
    font-family: var(--font-header);
    font-size: 2rem;
    color: var(--accent-color);
    margin-bottom: 1.5rem;
    line-height: 1.2;
}
#ll-desc {
    font-size: 1.05rem;
    line-height: 1.8;
    color: #e0e0e0;
    white-space: pre-line;
}
/* --- ARCANE SPIRAL ANIMATION --- */
.arcane-spiral-container {
    position: relative;
    width: 70px;
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
}
.arcane-ring-outer {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 0%, rgba(255, 215, 0, 0.1) 30%, rgba(255, 215, 0, 0.9) 100%);
    mask-image: radial-gradient(transparent 55%, black 56%);
    -webkit-mask-image: radial-gradient(transparent 55%, black 56%);
    animation: spin 1.5s linear infinite;
}
.arcane-ring-inner {
    position: absolute;
    width: 65%;
    height: 65%;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 0%, rgba(255, 255, 255, 0.1) 40%, rgba(255, 215, 0, 0.7) 100%);
    mask-image: radial-gradient(transparent 50%, black 51%);
    -webkit-mask-image: radial-gradient(transparent 50%, black 51%);
    animation: spin-reverse 2s linear infinite;
}
.arcane-core {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent-color);
    box-shadow: 0 0 15px var(--accent-color), 0 0 30px #fff;
    animation: arcane-pulse 1.2s ease-in-out infinite alternate;
}
@keyframes spin-reverse { 
    to { transform: rotate(-360deg); } 
}
@keyframes arcane-pulse { 
    0% { transform: scale(0.7); opacity: 0.6; } 
    100% { transform: scale(1.3); opacity: 1; } 
}

}

        // ==============================================

        // FIX 13: Visibility-aware particle engine — pauses when tab is hidden
        const Particles = {
            _rafId: null,
            _paused: false,
            init: () => {
                const canvas = document.getElementById('particle-canvas');
                const ctx = canvas.getContext('2d');
                let width, height, particlesArray = [];
                const resize = () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; };
                window.addEventListener('resize', resize); resize();
                class Particle {
                    constructor() {
                        this.x = Math.random() * width; this.y = Math.random() * height;
                        this.size = Math.random() * 1.5 + 0.5; this.speedY = Math.random() * 0.3 + 0.1; this.opacity = Math.random() * 0.5;
                    }
                    update() { this.y -= this.speedY; if(this.y < 0) { this.y = height; this.x = Math.random() * width; } }
                    draw() { ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
                }
                function initParticles() { particlesArray = []; for(let i=0; i<30; i++) particlesArray.push(new Particle()); }
                function animate() {
                    if (Particles._paused) return;
                    ctx.clearRect(0,0, width, height);
                    particlesArray.forEach(p => { p.update(); p.draw(); });
                    Particles._rafId = requestAnimationFrame(animate);
                }
                initParticles();
                animate();

                // Pause/resume on tab visibility change to save CPU/battery
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        Particles._paused = true;
                        if (Particles._rafId) {
                            cancelAnimationFrame(Particles._rafId);
                            Particles._rafId = null;
                        }
                    } else {
                        Particles._paused = false;
                        animate();
                    }
                });
            }
        };

        // ==============================================

        const Visuals = {

                if(window.innerWidth < 900) return;

                window.addEventListener('mousemove', (e) => {
                    if (!ticking) {
                        window.requestAnimationFrame(() => {
                            const w = window.innerWidth, h = window.innerHeight;
                            const isBottomRight = (e.clientX > w * 0.90) && (e.clientY > h * 0.90);
                            if (isBottomRight) {
                                app.style.opacity = '0'; bgLayer.style.filter = 'blur(0px) brightness(1)';
                            } else {
                                app.style.opacity = '1';
                                const isHoveringContent = e.target.closest('.glass-box') || e.target.closest('.char-card');
                                if (isHoveringContent) {
                                    bgLayer.style.filter = 'blur(5px) brightness(0.5)';
                                } else {
                                    const distX = Math.abs(e.clientX - w / 2), distY = Math.abs(e.clientY - h / 2);
                                    const blur = 5 * (1 - (Math.hypot(distX, distY) / Math.hypot(w/2, h/2))); 
                                    bgLayer.style.filter = `blur(${blur}px) brightness(${0.5 + (0.5 * (Math.hypot(distX, distY) / Math.hypot(w/2, h/2)))}`;

                        card.style.transform = `perspective(1000px) scale(1.02) rotateX(${y * -0.05}deg) rotateY(${x * 0.05}deg)`;

        // ==============================================
        // MAP VIEWER ENGINE
        // ==============================================
        const MapViewer = {
            viewer: null, canvas: null, img: null,
            state: { scale: 1, x: 0, y: 0, isDragging: false, startX: 0, startY: 0, lastDist: 0 },
            
            // FIX 5: AbortController for clean listener teardown
            _abortController: null,
            init: (src) => {
                // Clean up any previous instance first
                MapViewer.destroy();
                
                MapViewer._abortController = new AbortController();
                const signal = MapViewer._abortController.signal;
                
                MapViewer.viewer = document.getElementById('map-viewer');
                MapViewer.canvas = document.getElementById('map-canvas');
                MapViewer.img = document.getElementById('map-image');
                MapViewer.state = { scale: 1, x: 0, y: 0, isDragging: false, startX: 0, startY: 0, lastDist: 0 };
                MapViewer.img.onload = () => MapViewer.centerMap();
                MapViewer.img.src = src;
                const v = MapViewer.viewer;
                
                v.addEventListener('mousedown', MapViewer.onDown, { signal });
                window.addEventListener('mousemove', MapViewer.onMove, { signal });
                window.addEventListener('mouseup', MapViewer.onUp, { signal });
                v.addEventListener('wheel', MapViewer.onWheel, { passive: false, signal });

                v.addEventListener('touchstart', MapViewer.onTouchStart, { passive: false, signal });
                v.addEventListener('touchmove', MapViewer.onTouchMove, { passive: false, signal });
                v.addEventListener('touchend', MapViewer.onUp, { signal });

                document.getElementById('zoom-in-btn').onclick = () => MapViewer.zoom(1.2);
                document.getElementById('zoom-out-btn').onclick = () => MapViewer.zoom(0.8);
            },
            destroy: () => {
                // Abort all listeners registered with this controller
                if (MapViewer._abortController) {
                    MapViewer._abortController.abort();
                    MapViewer._abortController = null;
                }
            },
            centerMap: () => {
                if(!MapViewer.img || !MapViewer.viewer) return;
                const vw = MapViewer.viewer.clientWidth, vh = MapViewer.viewer.clientHeight;
                const iw = MapViewer.img.naturalWidth, ih = MapViewer.img.naturalHeight;
                const scale = Math.min(vw / iw, vh / ih, 1);
                MapViewer.state.scale = scale;
                MapViewer.state.x = (vw - iw * scale) / 2;
                MapViewer.state.y = (vh - ih * scale) / 2;
                MapViewer.update();
            },
            update: () => {
                const { x, y, scale } = MapViewer.state;
                MapViewer.canvas.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
            },
            clamp: () => {
                const vw = MapViewer.viewer.clientWidth, vh = MapViewer.viewer.clientHeight;
                const w = MapViewer.img.naturalWidth * MapViewer.state.scale;
                const h = MapViewer.img.naturalHeight * MapViewer.state.scale;
                if (w <= vw) MapViewer.state.x = (vw - w) / 2;
                else MapViewer.state.x = Math.min(0, Math.max(MapViewer.state.x, vw - w));
                if (h <= vh) MapViewer.state.y = (vh - h) / 2;
                else MapViewer.state.y = Math.min(0, Math.max(MapViewer.state.y, vh - h));
            },
            zoom: (factor) => {
                const oldScale = MapViewer.state.scale;
                const newScale = Math.max(0.1, Math.min(oldScale * factor, 5));
                const vw = MapViewer.viewer.clientWidth, vh = MapViewer.viewer.clientHeight;
                const cx = vw / 2, cy = vh / 2;
                MapViewer.state.x = cx - (cx - MapViewer.state.x) * (newScale / oldScale);
                MapViewer.state.y = cy - (cy - MapViewer.state.y) * (newScale / oldScale);
                MapViewer.state.scale = newScale;
                MapViewer.clamp(); MapViewer.update();
            },
            onWheel: (e) => { e.preventDefault(); MapViewer.zoom(e.deltaY < 0 ? 1.1 : 0.9); },
            onDown: (e) => { e.preventDefault(); MapViewer.startDrag(e.clientX, e.clientY); },
            onTouchStart: (e) => { 
                e.preventDefault(); 
                if (e.touches.length === 2) {
                    MapViewer.state.isDragging = false; 
                    MapViewer.state.lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                } else {
                    MapViewer.startDrag(e.touches[0].clientX, e.touches[0].clientY); 
                }
            },
            startDrag: (x, y) => {
                MapViewer.state.isDragging = true; 
                MapViewer.state.startX = x - MapViewer.state.x; 
                MapViewer.state.startY = y - MapViewer.state.y; 
                MapViewer.viewer.classList.add('is-dragging');
            },
            onMove: (e) => { if(MapViewer.state.isDragging) { e.preventDefault(); MapViewer.doDrag(e.clientX, e.clientY); } },
            onTouchMove: (e) => { 
                e.preventDefault(); 
                if (e.touches.length === 2) {
                    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    if (MapViewer.state.lastDist > 0) {
                        MapViewer.zoom(dist / MapViewer.state.lastDist);
                        MapViewer.state.lastDist = dist;
                    }
                } else if(MapViewer.state.isDragging) { 
                    MapViewer.doDrag(e.touches[0].clientX, e.touches[0].clientY); 
                } 
            },
            doDrag: (x, y) => {
                MapViewer.state.x = x - MapViewer.state.startX; 
                MapViewer.state.y = y - MapViewer.state.startY; 
                MapViewer.clamp(); MapViewer.update();
            },
            onUp: () => { MapViewer.state.isDragging = false; MapViewer.viewer.classList.remove('is-dragging'); }
        };

        // ==============================================
        // APPLICATION STATE
        // ==============================================
        const State = {

        // ==============================================
        // DATABASE API LAYER (WITH TTL + LRU CACHING)
        // ==============================================
        // FIX 10: TTL + LRU cache — prevents unbounded growth and stale data
        const Cache = {
            stories: null,
            storiesTTL: 0,

            authorTTL: 0,
            _hubEntries: [],    // Ordered list of {slug, data, timestamp}
            _hubMap: {},        // Quick lookup: slug -> data
            _HUB_MAX: 5,        // LRU cap
            _TTL: 5 * 60 * 1000, // 5 minutes

            getHub: (slug) => {
                const entry = Cache._hubMap[slug];
                if (!entry) return null;
                if (Date.now() - entry.timestamp > Cache._TTL) {
                    // Stale — evict
                    Cache._evictHub(slug);
                    return null;
                }
                // Move to end (most recently used)
                Cache._hubEntries = Cache._hubEntries.filter(e => e.slug !== slug);
                Cache._hubEntries.push(entry);
                return entry.data;
            },

            setHub: (slug, data) => {
                // Evict LRU if at capacity
                if (!Cache._hubMap[slug] && Cache._hubEntries.length >= Cache._HUB_MAX) {
                    const oldest = Cache._hubEntries.shift();
                    if (oldest) delete Cache._hubMap[oldest.slug];
                }
                // Remove existing entry if updating
                Cache._hubEntries = Cache._hubEntries.filter(e => e.slug !== slug);
                const entry = { slug, data, timestamp: Date.now() };
                Cache._hubEntries.push(entry);
                Cache._hubMap[slug] = entry;
            },

            _evictHub: (slug) => {
                Cache._hubEntries = Cache._hubEntries.filter(e => e.slug !== slug);
                delete Cache._hubMap[slug];
            },

            isStale: (ttlTimestamp) => {
                return !ttlTimestamp || (Date.now() - ttlTimestamp > Cache._TTL);
            }
        };

        const DB = {
            getStories: async () => {
                if (Cache.stories && !Cache.isStale(Cache.storiesTTL)) return Cache.stories;
                const { data, error } = await supabaseClient
                    .from('stories')

                    .eq('is_published', true)

                if (error) { console.error('Error fetching stories:', error); return []; }
                Cache.stories = data || [];
                Cache.storiesTTL = Date.now();
                return Cache.stories;
            },

            // FIX 11: Cached author profile — avoids re-fetching on every #home visit
            getAuthorProfile: async () => {
                if (Cache.author && !Cache.isStale(Cache.authorTTL)) return Cache.author;

                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('*')

                    .single();
                
                if (profileError || !profile) return null;

                const { data: links, error: linksError } = await supabaseClient
                    .from('author_links')
                    .select('*')
                    .eq('profile_id', profile.id)

                Cache.author = {
                    ...profile,

                Cache.authorTTL = Date.now();

            // The new unified and cached fetching function
            getStoryHubData: async (slug) => {
                const cached = Cache.getHub(slug);
                if (cached) return cached;

                const { data: story, error: storyError } = await supabaseClient
                    .from('stories')
                    .select('*')
                    .eq('slug', slug)
                    .eq('is_published', true)
                    .single();

                if (storyError || !story) return null;

                // Execute all dependent queries simultaneously
                // FIX 1: Batched timeline character query (eliminates N+1 waterfall)
                const [wallpapersReq, charactersReq, loreReq, timelineReq, mapsReq] = await Promise.all([
                    supabaseClient.from('story_wallpapers').select('*').eq('story_id', story.id).order('sort_order'),
                    supabaseClient.from('characters').select('*').eq('story_id', story.id).order('sort_order'),
                    supabaseClient.from('lore_entries').select('*, lore_categories(id, name, slug)').eq('story_id', story.id).order('sort_order'),
                    supabaseClient.from('timeline_events').select('*').eq('story_id', story.id).order('event_order'),
                    supabaseClient.from('maps').select('*').eq('story_id', story.id).order('sort_order')
                ]);

                const timelineEvents = timelineReq.data || [];
                
                // Single batched query instead of N sequential queries
                if (timelineEvents.length > 0) {
                    const eventIds = timelineEvents.map(e => e.id);
                    const { data: allCharLinks } = await supabaseClient
                        .from('timeline_event_characters')
                        .select('event_id, character_id, characters(id, name, role_title, profile_image_url)')
                        .in('event_id', eventIds);
                    
                    timelineEvents.forEach(event => {
                        event.characters = (allCharLinks || [])
                            .filter(cl => cl.event_id === event.id)
                            .map(cl => cl.characters);
                    });
                } else {
                    timelineEvents.forEach(event => { event.characters = []; });
                }

                const hubData = {
                    story: story,
                    wallpapers: wallpapersReq.data || [],
                    characters: charactersReq.data || [],

        // ==============================================
        // GALLERY ACTIONS
        // ==============================================
        const Actions = {
            currentGalleryImages: [],
            votesCache: {}, // { imageId: { score: 0, userVote: 0 } }
            
            fetchVotes: async () => {
                if(Actions.currentGalleryImages.length === 0) return;
                const imageIds = Actions.currentGalleryImages.map(img => img.id);
                
                try {
                    const { data: votes, error } = await supabaseClient
                        .from('image_votes')
                        .select('image_id, vote_value, user_id')
                        .in('image_id', imageIds);
                        
                    if (error) throw error;
                    
                    Actions.votesCache = {};
                    imageIds.forEach(id => Actions.votesCache[id] = { score: 0, userVote: 0 });
                    
                    const userId = UserAuth.user ? UserAuth.user.id : null;
                    
                    votes.forEach(v => {
                        if(Actions.votesCache[v.image_id]) {
                            Actions.votesCache[v.image_id].score += v.vote_value;
                            if(userId && v.user_id === userId) {
                                Actions.votesCache[v.image_id].userVote = v.vote_value;
                            }
                        }
                    });
                } catch(err) {
                    console.error('Error fetching votes:', err);
                }
            },

            voteImage: async (imageId, value) => {
                if(!UserAuth.user) {
                    UI.openAuthModal();
                    return;
                }
                
                const currentVote = Actions.votesCache[imageId]?.userVote || 0;
                let newValue = value;
                
                if (currentVote === value) {
                    newValue = 0; // Toggle off
                }
                
                try {
                    if (newValue === 0) {
                        await supabaseClient.from('image_votes')
                            .delete()
                            .eq('image_id', imageId)
                            .eq('user_id', UserAuth.user.id);
                    } else {
                        await supabaseClient.from('image_votes')
                            .upsert({ 
                                image_id: imageId, 
                                user_id: UserAuth.user.id, 
                                vote_value: newValue 
                            }, { onConflict: 'user_id, image_id' });
                    }
                    
                    Actions.votesCache[imageId].score += (newValue - currentVote);
                    Actions.votesCache[imageId].userVote = newValue;
                    Actions.renderGalleryGrid();
                } catch (err) {
                    console.error('Vote error:', err);
                    alert('Failed to register vote.');
                }
            },
            
            // FIX 14: Chunked gallery rendering via requestIdleCallback to avoid long tasks
            renderGalleryGrid: (shuffle = false) => {
                let imgs = [...Actions.currentGalleryImages];
                if (State.filterTag !== 'All') {
                    imgs = imgs.filter(i => i.image_tags && i.image_tags.includes(State.filterTag));
                }
                if (shuffle) imgs.sort(() => Math.random() - 0.5);
                
                Actions.filteredImages = imgs;
                
                const container = document.getElementById('gallery-grid');
                container.innerHTML = ''; // Clear existing

                const CHUNK_SIZE = 8;
                let idx = 0;

                const renderChunk = (deadline) => {
                    const frag = document.createDocumentFragment();
                    const chunkEnd = Math.min(idx + CHUNK_SIZE, imgs.length);
                    
                    while (idx < chunkEnd) {
                        const i = imgs[idx];
                        const currentIdx = idx;
                        const cache = Actions.votesCache[i.id] || { score: 0, userVote: 0 };
                        
                        const item = document.createElement('div');
                        item.className = 'gallery-item';
                        item.style.position = 'relative';
                        item.innerHTML = `
                            <img src="${i.image_url}" loading="lazy" onclick="Visuals.openGalleryLightbox(${currentIdx}, Actions.filteredImages)">
                            <div class="image-vote-container" onclick="event.stopPropagation()">
                                <button class="vote-btn upvote ${cache.userVote === 1 ? 'active' : ''}" onclick="Actions.voteImage('${i.id}', 1)"><i class="fas fa-arrow-up"></i></button>
                                <div class="vote-score">${cache.score}</div>
                                <button class="vote-btn downvote ${cache.userVote === -1 ? 'active' : ''}" onclick="Actions.voteImage('${i.id}', -1)"><i class="fas fa-arrow-down"></i></button>
                            </div>
                            <button style="position:absolute; bottom:15px; right:15px; background:rgba(0,0,0,0.5); backdrop-filter:blur(5px); border:1px solid rgba(255,215,0,0.2); color:var(--accent-color); border-radius:50%; width:35px; height:35px; cursor:pointer; z-index:10; transition:all 0.3s;" onmouseover="this.style.background='var(--accent-color)'; this.style.color='#000'; this.style.transform='scale(1.1)';" onmouseout="this.style.background='rgba(0,0,0,0.5)'; this.style.color='var(--accent-color)'; this.style.transform='scale(1)';" onclick="event.stopPropagation(); CommentsManager.openDrawer('${i.character_id}', 'gallery', 'Image Discussion', { imageUrl: '${i.image_url}' })" title="Comment on this image">
                                <i class="fas fa-comment"></i>
                            </button>`;
                        frag.appendChild(item);
                        idx++;
                    }
                    
                    container.appendChild(frag);
                    
                    if (idx < imgs.length) {
                        // Schedule next chunk — use requestIdleCallback if available, else rAF fallback
                        if (window.requestIdleCallback) {
                            requestIdleCallback(renderChunk, { timeout: 100 });
                        } else {
                            requestAnimationFrame(() => renderChunk());
                        }
                    }
                };

                // Start first chunk immediately for fast first paint
                renderChunk();
            },
            setFilter: (t) => { State.filterTag = t; Actions.renderGalleryGrid(); },
            shuffleGallery: () => Actions.renderGalleryGrid(true),
        };

                    UI.initAuthLink(null);
                    UI.initAdminLink();

                        await UserAuth.fetchProfile(session.user);
                        UI.closeAuthModal();
                        CommentsManager.refreshRenderedThreads();

                        UserAuth.profile = null;
                        UI.initAuthLink(null);

                        UI.closeProfileModal();
                        CommentsManager.refreshRenderedThreads();
                    }
                });
            },

            fetchProfile: async (user) => {
                UserAuth.user = user;
                const { data, error } = await supabaseClient

            handleSubmit: async () => {

                try {
                    let result;
                    if (UserAuth.mode === 'signup') {
                        result = await supabaseClient.auth.signUp({ email, password });
                        if (result.data?.user && result.data?.user?.identities?.length === 0) {
                            throw new Error('This email is already registered. Please sign in.');
                        }
                    } else {
                        result = await supabaseClient.auth.signInWithPassword({ email, password });
                    }

                    if (result.error) throw result.error;

                    errorEl.style.color = 'var(--success-color)';
                    errorEl.textContent = 'Success!';

                    errorEl.style.color = 'var(--danger-color)';
                    errorEl.textContent = err.message;

            signOut: async () => {

            uploadAvatar: async (fileInput) => {
                if (!UserAuth.user || !fileInput.files || !fileInput.files[0]) return;
                
                const statusEl = document.getElementById('avatar-upload-status');
                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${UserAuth.user.id}-${Date.now()}.${fileExt}`;
                const filePath = `${fileName}`;
                
                statusEl.style.color = '#fff';
                statusEl.textContent = 'Uploading...';
                
                // Show preview immediately
                // FIX 7: Revoke ObjectURL after image loads to prevent memory leak
                const previewUrl = URL.createObjectURL(file);
                const previewImg = document.getElementById('profile-avatar-preview');
                previewImg.onload = () => URL.revokeObjectURL(previewUrl);
                previewImg.src = previewUrl;
                
                // Upload to Supabase
                const { error: uploadError } = await supabaseClient.storage
                    .from('Reader')
                    .upload(filePath, file, { cacheControl: '3600', upsert: true });
                    
                if (uploadError) {
                    statusEl.style.color = 'var(--danger-color)';
                    statusEl.textContent = 'Failed: ' + uploadError.message;
                    fileInput.value = ''; // Reset
                    return;
                }
                
                const { data: publicUrlData } = supabaseClient.storage
                    .from('Reader')
                    .getPublicUrl(filePath);
                    
                const avatarUrl = publicUrlData.publicUrl;
                document.getElementById('profile-avatar').value = avatarUrl;
                
                // Immediately save to profile in backend
                const { error: updateError } = await supabaseClient
                    .from('profiles')
                    .update({
                        avatar_url: avatarUrl,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', UserAuth.user.id);
                    
                if (updateError) {
                    statusEl.style.color = 'var(--danger-color)';
                    statusEl.textContent = 'Backend error: ' + updateError.message;
                } else {
                    statusEl.style.color = 'var(--success-color)';
                    statusEl.textContent = 'Avatar updated!';
                    UserAuth.profile.avatar_url = avatarUrl;
                    UI.initAuthLink(UserAuth.profile);
                    CommentsManager.refreshRenderedThreads();
                    setTimeout(() => statusEl.textContent = '', 2000);
                }
                fileInput.value = ''; // Reset input
            },

            saveProfile: async () => {

                };

        const CommentsManager = {
            activeTargetId: null,

            activeContext: {},
            containerPrefix: 'drawer', 

            openDrawer: async (targetId, targetType, title = 'Discussion', context = {}, prefix = 'drawer') => {
                CommentsManager.activeTargetId = targetId;
                CommentsManager.activeTargetType = targetType;
                CommentsManager.activeContext = context;
                CommentsManager.containerPrefix = prefix;
                
                if (prefix === 'drawer') {
                    const drawer = document.getElementById('comments-drawer');

            closeDrawer: () => {

                    document.body.classList.remove('drawer-open');
                }
                CommentsManager.activeTargetId = null;

            },

            renderInput: () => {
                const inputArea = document.getElementById(CommentsManager.containerPrefix + '-input-area');
                if (!inputArea) return;
                
                if (UserAuth.user && UserAuth.profile) {
                    let imageHtml = '';

                    }

                    let contextLabel = '';
                    if (CommentsManager.activeContext.paragraphIndex !== undefined) {
                        contextLabel = `<div style="font-size:0.75rem; color:var(--accent-color); margin-bottom:0.5rem; text-transform:uppercase;">Commenting on Paragraph ${CommentsManager.activeContext.paragraphIndex + 1}</div>`;
                    }

                                <img src="${UserAuth.profile.avatar_url || 'https://via.placeholder.com/40'}" class="comment-avatar">
                                <div style="flex: 1;">

                                    <div class="comment-submit-container" style="margin-top: 0.8rem;">

                        </div>
                    `;
                }
            },

            loadThread: async () => {
                const threadArea = document.getElementById(CommentsManager.containerPrefix + '-thread-area');
                if (!threadArea) return;
                threadArea.innerHTML = '<div style="color: #666; text-align: center;">Loading records...</div>';

                try {
                    let query = supabaseClient
                        .from('comments')
                        .select(`
                            id, content, created_at, user_id, metadata,
                            profiles!comments_user_id_fkey ( display_name, avatar_url, role )
                        `)
                        .eq('target_id', CommentsManager.activeTargetId)
                        .eq('target_type', CommentsManager.activeTargetType)
                        .order('created_at', { ascending: true });

                    if (CommentsManager.activeContext.paragraphIndex !== undefined) {
                        query = query.contains('metadata', { paragraphIndex: CommentsManager.activeContext.paragraphIndex });
                    }
                    if (CommentsManager.containerPrefix === 'lightbox' && CommentsManager.activeContext.imageUrl) {
                        query = query.contains('metadata', { imageUrl: CommentsManager.activeContext.imageUrl });
                    }

                    const { data: comments, error } = await query;

                    if (error) throw error;

                    if (!comments || comments.length === 0) {
                        threadArea.innerHTML = '<div style="color: #666; text-align: center; padding: 1rem 0;">No comments found.</div>';
                        return;
                    }

                    let html = '';
                    comments.forEach((c) => {
                        const author = c.profiles || {};
                        const isAdmin = author.role === 'admin';
                        const dateString = new Date(c.created_at).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
                        
                        let attachmentHtml = '';
                        if (c.metadata && c.metadata.imageUrl && CommentsManager.containerPrefix !== 'lightbox') {
                            attachmentHtml = `<img src="${c.metadata.imageUrl}" class="comment-attachment">`;
                        }

                        const isOwnComment = UserAuth.user && c.user_id === UserAuth.user.id;
                        let actionHtml = '';
                        if (isOwnComment) {
                            actionHtml = `
                                <div class="comment-actions" style="margin-top:0.5rem; display:flex; gap:10px;">
                                    <button class="btn-large" style="padding: 2px 8px; font-size: 0.7rem;" onclick="CommentsManager.editComment('${c.id}', \`${Utils.escapeHtml(c.content.replace(/\\/g, '\\\\').replace(/\`/g, '\\`'))}\`)">Edit</button>
                                    <button class="btn-large" style="padding: 2px 8px; font-size: 0.7rem; background: rgba(255,0,0,0.1); color: #ff6b6b; border-color: #ff6b6b;" onclick="CommentsManager.deleteComment('${c.id}')">Delete</button>

                        html += `

                                <div class="comment-body" style="flex:1;">

                                        </div>

                                    ${actionHtml}
                                    <div id="comment-edit-area-${c.id}" style="display:none; margin-top: 0.8rem;">
                                        <textarea id="comment-edit-input-${c.id}" class="comment-textarea"></textarea>
                                        <div style="margin-top: 0.5rem; display:flex; gap:10px;">
                                            <button class="btn-large" style="padding: 4px 12px; font-size: 0.75rem;" onclick="CommentsManager.saveEdit('${c.id}')">Save</button>
                                            <button class="btn-large" style="padding: 4px 12px; font-size: 0.75rem; border-color: #888; color: #888;" onclick="CommentsManager.cancelEdit('${c.id}')">Cancel</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        imgContainer.style.visibility = 'visible';
                        imgContainer.style.opacity = '1';

        // ==============================================

        const Render = {
            stage: document.getElementById('content-stage'),
            

            home: async () => {

                    DB.getStories(),

                if (!stories || stories.length === 0) {
                    html += `
                        <div style="grid-column: 1 / -1; text-align: center; padding: 4rem; background: rgba(0,0,0,0.5); border-radius: 12px; border: 1px dashed #555;">

                        </div>
                    `;
                } else {
                    // Render stories if they exist
                    // FIX 6: First 4 story cards use eager loading for LCP
                    stories.forEach((s, idx) => {
                        const loadAttr = idx < 4 ? '' : 'loading="lazy"';
                        html += `
                            <div class="story-card" onclick="Router.navigate('story/${s.slug}')">
                                <img src="${s.cover_image_url || ''}" ${loadAttr}>
                                <div class="card-info">

            storyHub: async (slug) => {
                UI.showLoading();
                UI.setBackButton("Router.navigate('home')", "Archives");

                const hubData = await DB.getStoryHubData(slug);
                
                if (!hubData || !hubData.story) {

                                ${hubData.timeline.length > 0 ? `<button class="btn-large" onclick="Router.navigate('timeline/${slug}')"><i class="fas fa-stream"></i> Timeline</button>` : ''}
                                ${hubData.maps.length > 0 ? `<button class="btn-large" onclick="Router.navigate('maps/${slug}')"><i class="fas fa-map-marked-alt"></i> Maps</button>` : ''}

            gallery: async (slug, charId = null) => {
                UI.showLoading();
                
                const hubData = await DB.getStoryHubData(slug);
                if (!hubData || !hubData.story) { Router.navigate('home'); return; }
                const story = hubData.story;
                
                State.currentStory = story;
                UI.setBg(story.background_image_url);
                document.documentElement.style.setProperty('--accent-color', story.theme_color || '#ffd700');

                const characters = hubData.characters;
                State.currentChars = characters;
                
                if (!charId) {
                    // Character grid view
                    UI.setBackButton(`Router.navigate('story/${slug}')`, "Story Hub");
                    
                    let html = '<div class="char-grid">';
                    // FIX 6: First 6 character cards use eager loading
                    characters.forEach((c, idx) => { 
                        const loadAttr = idx < 6 ? '' : 'loading="lazy"';
                        html += `
                            <div class="char-card" onclick="Router.navigate('gallery/${slug}/${c.id}')">
                                <div class="char-card-inner">

                    Actions.currentGalleryImages = galleryImages;
                    await Actions.fetchVotes();

                    const globalBtn = document.getElementById('global-comment-btn');

                        globalBtn.style.display = 'flex';
                        globalBtn.onclick = () => CommentsManager.openDrawer(charId, 'gallery', character.name + ' Discussion');

                        if (i.image_tags) i.image_tags.forEach(t => tags.add(t));

                    let tHtml = `<div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:1.5rem">`;
                    tags.forEach(t => {
                        const isActive = t === State.filterTag;
                        tHtml += `<div class="btn-large" style="padding:4px 12px; font-size:0.75rem; border-radius:20px; text-transform:none; letter-spacing:0; min-height:0; ${isActive ? 'background:var(--accent-color); color:#000':''}" onclick="Actions.setFilter('${t}')">${t}</div>`;
                    });
                    tHtml += `<div class="btn-large" style="padding:4px 12px; font-size:0.75rem; border-radius:20px; min-height:0;" onclick="Actions.shuffleGallery()"><i class="fas fa-random"></i></div></div>`;

                    Actions.renderGalleryGrid();
                }
            },

            reader: async (slug, chIdx = 0) => {
                UI.showLoading();
                
                const hubData = await DB.getStoryHubData(slug);
                if (!hubData || !hubData.story) { Router.navigate('home'); return; }
                const story = hubData.story;

                State.currentStory = story;
                UI.setBg(story.background_image_url);
                UI.setBackButton(`Router.navigate('story/${slug}')`, "Story Hub");
                document.documentElement.style.setProperty('--accent-color', story.theme_color || '#ffd700');

                const chapters = await DB.getChapters(story.id);
                
                if (!chapters || !chapters[chIdx]) {
                    Render.stage.innerHTML = `<div class="glass-box" style="padding:2rem; text-align:center;"><h3>Chapter Error</h3><p>Chapter not found.</p></div>`;
                    return;
                }

                const chapter = chapters[chIdx];
                
                let sidebar = '';
                chapters.forEach((c, i) => {
                    sidebar += `<div class="chapter-list-item ${i == chIdx ? 'active':''}" onclick="Router.navigate('read/${slug}/${i}'); ReaderFeatures.toggleSidebar()">${c.title}</div>`;
                });
                
                let nextBtn = parseInt(chIdx) < chapters.length - 1 
                    ? `<button class="btn-large" style="margin:2rem auto 0; font-size:0.8rem" onclick="Router.navigate('read/${slug}/${parseInt(chIdx) + 1}')">Next Chapter</button>` 
                    : '<div style="margin-top:2rem; text-align:center; color:#888">End of updates.</div>';
                
                // Process content into annotated paragraphs
                const rawParagraphs = chapter.content.split('\n').filter(p => p.trim().length > 0);
                const annotatedContent = rawParagraphs.map((para, idx) => `
                    <div class="paragraph-block">
                        <p>${para}</p>
                        <button class="para-comment-btn" onclick="CommentsManager.openDrawer('${chapter.id}', 'chapter', 'Paragraph ${idx + 1}', { paragraphIndex: ${idx} })" title="Comment on this paragraph">
                            <i class="fas fa-comment-alt"></i>
                        </button>
                    </div>
                `).join('');

                const globalBtn = document.getElementById('global-comment-btn');
                if (globalBtn) {
                    globalBtn.style.display = 'flex';
                    globalBtn.onclick = () => CommentsManager.openDrawer(chapter.id, 'chapter', 'Chapter Discussion');
                }

                Render.stage.innerHTML = `
                    <div class="reader-layout">
                        <div class="sidebar-backdrop" onclick="ReaderFeatures.toggleSidebar()"></div>
                        <div class="reader-sidebar glass-box">
                            <h3 style="padding:1rem; font-family:var(--font-header)">Chapters</h3>

                        </div>
                        <div class="reader-content glass-box ${ReaderFeatures.fontSize} ${ReaderFeatures.fontFamily}">
                            <div class="reader-toolbar">
                                <button class="rt-btn" title="General Chapter Comments" onclick="CommentsManager.openDrawer('${chapter.id}', 'chapter', 'Chapter Discussion')"><i class="fas fa-comments"></i></button>
                                <button class="rt-btn" title="Chapters" onclick="ReaderFeatures.toggleSidebar()"><i class="fas fa-list"></i></button>
                                <button class="rt-btn" title="Focus" onclick="ReaderFeatures.toggleFocus(this)"><i class="fas fa-expand"></i></button>
                                <div style="position:relative;">
                                    <button class="rt-btn" title="Fonts" onclick="ReaderFeatures.toggleFontMenu()"><i class="fas fa-font"></i></button>
                                    <div id="font-menu" class="font-menu">
                                        <div class="font-option" onclick="ReaderFeatures.setFontFamily('font-serif')">Serif</div>
                                        <div class="font-option" onclick="ReaderFeatures.setFontFamily('font-sans')">Sans</div>
                                        <div style="border-top:1px solid #333; margin:4px 0"></div>
                                        <div class="font-option" onclick="ReaderFeatures.setFontSize('text-sm')">Small</div>
                                        <div class="font-option" onclick="ReaderFeatures.setFontSize('text-md')">Medium</div>
                                        <div class="font-option" onclick="ReaderFeatures.setFontSize('text-lg')">Large</div>
                                    </div>
                                </div>
                            </div>
                            <h2 style="font-family:var(--font-header); margin-bottom:1.5rem; line-height:1.3;">${chapter.title}</h2>
                            <div class="chapter-text">${annotatedContent}</div>
                            ${nextBtn}
                        </div>
                    </div>`;
            },

            lore: async (slug) => {
                UI.showLoading();
                
                const hubData = await DB.getStoryHubData(slug);
                if (!hubData || !hubData.story) { Router.navigate('home'); return; }
                const story = hubData.story;

                UI.setBackButton(`Router.navigate('story/${slug}')`, "Story Hub");
                UI.setBg(story.background_image_url);
                document.documentElement.style.setProperty('--accent-color', story.theme_color || '#ffd700');

                const loreEntries = hubData.lore;
                
                if (!loreEntries || loreEntries.length === 0) {
                    Render.stage.innerHTML = `<div style="padding:2rem;text-align:center">No lore data found.</div>`;
                    return;
                }
                
                // FIX 15: Use DocumentFragment to build lore grid, avoiding intermediate innerHTML parsing
                const loreGrid = document.createElement('div');
                loreGrid.className = 'lore-grid';
                const frag = document.createDocumentFragment();

                loreEntries.forEach((item, idx) => {
                    const categoryName = item.lore_categories ? item.lore_categories.name : 'Uncategorized';
                    const loadAttr = idx < 6 ? '' : 'loading="lazy"';  // FIX 6: eager for first visible row
                    const card = document.createElement('div');
                    card.className = 'lore-card glass-box';
                    card.onclick = () => Router.navigate(`lore/${slug}/${item.slug}`);
                    card.innerHTML = `
                        <img src="${item.image_url || ''}" class="lore-card-img" ${loadAttr}>
                        <div class="lore-card-content">
                            <div class="title">${item.title}</div>
                            <div class="type">${categoryName}</div>
                            <div class="desc">${item.description || ''}</div>
                        </div>`;
                    frag.appendChild(card);
                });

                loreGrid.appendChild(frag);
                Render.stage.innerHTML = '';
                Render.stage.appendChild(loreGrid);
            },

            loreDetail: async (slug, loreSlug) => {
                UI.showLoading();
                
                const hubData = await DB.getStoryHubData(slug);
                if (!hubData || !hubData.story) { Router.navigate('home'); return; }
                const story = hubData.story;

                UI.setBackButton(`Router.navigate('lore/${slug}')`, "Lore Index");

                if (globalBtn) {

                    globalBtn.onclick = () => CommentsManager.openDrawer(item.id, 'lore', 'Lore Discussion');
                }

                Render.stage.innerHTML = `
                    <div class="lore-wiki-layout">
                        <div class="lore-wiki-header"><img src="${item.image_url || ''}"></div>

                            </div>
                        </div>
                    </div>`;
            },

            timeline: async (slug) => {
                UI.showLoading();
                
                const hubData = await DB.getStoryHubData(slug);
                if (!hubData || !hubData.story) { Router.navigate('home'); return; }
                const story = hubData.story;

                UI.setBackButton(`Router.navigate('story/${slug}')`, "Story Hub");
                UI.setBg(story.background_image_url);
                document.documentElement.style.setProperty('--accent-color', story.theme_color || '#ffd700');

                const events = hubData.timeline;
                
                if (!events || events.length === 0) {
                    Render.stage.innerHTML = `<div style="padding:2rem;text-align:center">No timeline data.</div>`;
                    return;
                }

                let html = '<div class="timeline-wrapper"><div class="timeline-path"></div>';
                events.forEach((evt, i) => {
                    const sideClass = i % 2 === 0 ? 'node-left' : 'node-right';
                    
                    let charHTML = '';
                    if (evt.characters && evt.characters.length > 0) {
                        const char = evt.characters[0]; // First linked character
                        charHTML = `
                            <div class="timeline-char-box glass-box" onclick="Router.navigate('gallery/${slug}/${char.id}')">
                                <img src="${char.profile_image_url || ''}" class="timeline-char-img">
                                <div class="timeline-char-info">

                                    <div class="timeline-char-name">${char.name}</div>

                    }
                    
                    html += `
                        <div class="timeline-node ${sideClass}">
                            <div class="timeline-dot"></div>
                            <div class="timeline-content glass-box">
                                <div class="date">${evt.event_date}</div>
                                <div class="title">${evt.title}</div>
                                <div class="desc">${evt.description}</div>
                            </div>
