            maps: async (slug) => {
                UI.showLoading();
                
                const hubData = await DB.getStoryHubData(slug);
                if (!hubData || !hubData.story) { Router.navigate('home'); return; }
                const story = hubData.story;

                UI.setBackButton(`Router.navigate('story/${slug}')`, "Story Hub");
                UI.setBg(story.background_image_url);
                document.documentElement.style.setProperty('--accent-color', story.theme_color || '#ffd700');

                const maps = hubData.maps;
                
                if (!maps || maps.length === 0) {
                    Render.stage.innerHTML = `<div style="padding:2rem;text-align:center">No maps found.</div>`;
                    return;
                }

                let btns = '';
                maps.forEach(m => {
                    btns += `<button class="map-selector-btn ${m.is_primary ? 'active' : ''}" data-src="${m.image_url}" onclick="MapViewer.img.src='${m.image_url}'; document.querySelectorAll('.map-selector-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active');">${m.map_name}</button>`;
                });
                
                const primary = maps.find(m => m.is_primary) || maps[0];
                
                Render.stage.innerHTML = `
                    <div class="map-layout">
                        <div class="map-selector glass-box">${btns}</div>
                        <div class="map-viewer" id="map-viewer">
                            <div class="map-canvas" id="map-canvas">
                                <img src="${primary.image_url}" id="map-image" draggable="false">
                            </div>
                            <div class="map-controls">
                                <button class="map-control-btn" id="zoom-in-btn"><i class="fas fa-plus"></i></button>
                                <button class="map-control-btn" id="zoom-out-btn"><i class="fas fa-minus"></i></button>
                            </div>
                        </div>
                    </div>`;
                
                setTimeout(() => MapViewer.init(primary.image_url), 50);
            }
        };

        // ==============================================
        // ROUTER
        // ==============================================
        const Router = {
            getParts: () => (window.location.hash.slice(1) || 'home').split('/'),
            
            navigate: (h) => {
                // Fade out the content stage
                document.getElementById('content-stage').style.opacity = '0';
                // FIX 3: Pre-fetch data during the 400ms fade-out transition
                const parts = h.split('/');
                const target = parts[0];
                const slug = parts[1];
                if (slug && ['story','read','gallery','lore','timeline','maps'].includes(target)) {
                    DB.getStoryHubData(slug); // fire-and-forget; result will be cached for Router.handle
                }
                setTimeout(() => window.location.hash = h, 400); 
            },
            
            handle: () => {
                CommentsManager.closeDrawer();
                const globalBtn = document.getElementById('global-comment-btn');
                if (globalBtn) globalBtn.style.display = 'none';

                Visuals.closeLightbox();
                document.getElementById('wp-modal').style.display = 'none';
                
                if (MapViewer.destroy) MapViewer.destroy();

                // Clean up transient state on route change
                Actions.currentGalleryImages = [];
                Actions.votesCache = {};
                
                const sb = document.querySelector('.reader-sidebar');
                if(sb) sb.classList.remove('active');
                const bd = document.querySelector('.sidebar-backdrop');
                if(bd) bd.classList.remove('active');
                
                document.body.classList.remove('focus-active');

                const parts = Router.getParts();
                const view = parts[0];
                const id = parts[1];
                const subId = parts[2];
                
                (async () => {
                    if (view === 'home') await Render.home();
                    else if (view === 'story') await Render.storyHub(id);
                    else if (view === 'read') await Render.reader(id, parseInt(subId) || 0);
                    else if (view === 'gallery') await Render.gallery(id, subId);
                    else if (view === 'lore') {
                        if(subId) await Render.loreDetail(id, subId);
                        else await Render.lore(id);
                    }
                    else if (view === 'timeline') await Render.timeline(id);
                    else if (view === 'maps') await Render.maps(id);
                    else await Render.home();
                })().then(() => {
                    setTimeout(() => {
                        UI.hideLoading();
                        const stage = document.getElementById('content-stage');
                        stage.scrollTop = 0;
                        // Fade the new content back in
                        stage.style.opacity = '1';
                    }, 800);
                });
            }
        };

        // ==============================================
        // INITIALIZATION
        // ==============================================
        window.addEventListener('hashchange', Router.handle);
        window.addEventListener('DOMContentLoaded', async () => { 
            // FIX 2: Non-blocking prefetcher — cosmetic data should not block critical path
            LorePrefetcher.init(); // fire-and-forget (no await)
            UserAuth.init();
            Router.handle(); 
            Visuals.initDynamicTransparency(); 
            Particles.init();
            AudioController.init();
        });
    </script>
</body>
</html>
